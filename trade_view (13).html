<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#ffffff">
<title>MOP·ICT·QUANT — Live Signal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://s3.tradingview.com/tv.js"></script>
<style>
:root{
  --bg:#ffffff;--bg2:#f5f7fa;--bg3:#eef1f6;--bg4:#e4e8f0;
  --border:#dde2ea;--border2:#c8d0dc;
  --long:#009a52;--long2:#d4f0e3;--short:#d92840;--short2:#fde8ec;
  --amber:#c07a00;--amberBg:#fff7e0;--blue:#1a6fff;--cyan:#0099bb;
  --text:#1a2332;--text2:#5a6e84;--text3:#9aaabb;
  --mono:'JetBrains Mono',monospace;--sans:'Syne',sans-serif;
  --r:8px;--r2:14px;
  --shadow:0 1px 4px rgba(0,0,0,.07),0 2px 12px rgba(0,0,0,.04);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:13px}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
#app{max-width:480px;margin:0 auto;padding-bottom:74px}
/* HEADER */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;background:rgba(255,255,255,.97);backdrop-filter:blur(16px)}
.hdr-left{display:flex;align-items:center;gap:7px}
.hdr-logo{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--text3);letter-spacing:.1em}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--long);animation:lp 2s ease-in-out infinite}
.ldot.off{background:var(--text3);animation:none}
@keyframes lp{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,154,82,.5)}50%{opacity:.7;box-shadow:0 0 0 4px rgba(0,154,82,0)}}
.hdr-px{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text)}
.hdr-chg{font-family:var(--mono);font-size:8px;color:var(--text2)}
.hdr-ver{font-family:var(--mono);font-size:8px;color:var(--text3);background:var(--bg3);padding:2px 5px;border-radius:3px;border:1px solid var(--border)}
/* FIX-6: age badge */
.age-badge{font-family:var(--mono);font-size:8px;padding:2px 6px;border-radius:3px;border:1px solid;margin-left:4px;transition:all .3s}
.age-fresh{background:var(--long2);color:var(--long);border-color:rgba(0,154,82,.3)}
.age-warn{background:var(--amberBg);color:var(--amber);border-color:rgba(192,122,0,.3)}
.age-stale{background:var(--short2);color:var(--short);border-color:rgba(217,40,64,.3);animation:pulse-red 1.5s infinite}
@keyframes pulse-red{0%,100%{opacity:1}50%{opacity:.6}}
/* HERO */
.hero{margin:10px 10px 0;border-radius:var(--r2);border:1px solid var(--border);overflow:hidden;position:relative;background:var(--bg2);box-shadow:var(--shadow);transition:border-color .3s,box-shadow .3s}
/* FIX-7: invalidation breach flash */
.hero.inv-breach{border-color:var(--short)!important;box-shadow:0 0 0 2px rgba(217,40,64,.25),var(--shadow)!important;animation:inv-flash 1s ease-in-out 3}
@keyframes inv-flash{0%,100%{border-color:var(--short)}50%{border-color:rgba(217,40,64,.3)}}
.hero-glow{position:absolute;inset:0;pointer-events:none;border-radius:var(--r2);opacity:.06}
.hero.long .hero-glow{background:radial-gradient(ellipse at 20% 50%,var(--long) 0%,transparent 65%)}
.hero.short .hero-glow{background:radial-gradient(ellipse at 20% 50%,var(--short) 0%,transparent 65%)}
.hero-top{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 8px}
.dchip{font-family:var(--mono);font-size:10px;font-weight:700;padding:4px 10px;border-radius:5px;letter-spacing:.1em}
.long .dchip{background:var(--long2);color:var(--long);border:1px solid rgba(0,154,82,.3)}
.short .dchip{background:var(--short2);color:var(--short);border:1px solid rgba(217,40,64,.3)}
.hsym{font-family:var(--mono);font-size:17px;font-weight:700;color:var(--text);margin-left:8px}
.hm{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;padding:0 10px 12px}
.mc{background:var(--bg);border-radius:6px;padding:7px 6px;text-align:center;border:1px solid var(--border)}
.ml{font-family:var(--mono);font-size:7px;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;display:block}
.mv{font-family:var(--mono);font-size:13px;font-weight:700;display:block;margin-top:2px}
.mv.g{color:var(--long)}.mv.r{color:var(--short)}.mv.a{color:var(--amber)}
/* STATE */
.state{margin:6px 10px 0;padding:8px 12px;border-radius:var(--r);display:flex;align-items:center;justify-content:space-between;border:1px solid}
.state.active{background:var(--long2);border-color:rgba(0,154,82,.3)}
.state.blocked{background:var(--short2);border-color:rgba(217,40,64,.25)}
.state.deferred{background:var(--amberBg);border-color:rgba(192,122,0,.25)}
.sdot{width:6px;height:6px;border-radius:50%;margin-right:6px;display:inline-block}
.active .sdot{background:var(--long);animation:lp 2s infinite}
.blocked .sdot{background:var(--short)}.deferred .sdot{background:var(--amber)}
.slbl{font-family:var(--mono);font-size:10px;font-weight:700}
.active .slbl{color:var(--long)}.blocked .slbl{color:var(--short)}.deferred .slbl{color:var(--amber)}
.sev{font-family:var(--mono);font-size:8px;color:var(--text2)}
/* TABS */
.tabs{display:flex;border-bottom:1px solid var(--border);margin:10px 10px 0;border-radius:var(--r) var(--r) 0 0;overflow:hidden;background:var(--bg2)}
.tab{flex:1;padding:10px 4px;text-align:center;cursor:pointer;font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.06em;color:var(--text2);border:none;background:none;outline:none;transition:all .2s;border-bottom:2px solid transparent}
.tab.active{color:var(--blue);border-bottom-color:var(--blue);background:var(--bg)}
.tab:active{transform:scale(.97)}
.cpanel{margin:0 10px;background:var(--bg2);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r2) var(--r2);overflow:hidden;display:none}
.cpanel.vis{display:block}
/* U2 FIX: height only on element inline */
#tv-container{width:100%;height:100%}
/* ICT BAR */
.ict-bar{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-bottom:1px solid var(--border);background:var(--bg3)}
.tfbtns{display:flex;gap:3px}
.tfb{font-family:var(--mono);font-size:8px;padding:3px 7px;border-radius:4px;border:1px solid var(--border2);background:var(--bg);color:var(--text2);cursor:pointer;transition:all .15s}
.tfb.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.cst{display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:8px;color:var(--text2)}
.cdot{width:5px;height:5px;border-radius:50%;background:var(--border2)}
.cdot.live{background:var(--long);animation:lp 2s infinite}
#ict-wrap{position:relative;width:100%;height:300px;background:#f8fafb}
#ict-cv{display:block;width:100%;height:100%}
.lgrow{display:flex;flex-wrap:wrap;gap:4px;padding:7px 10px;border-top:1px solid var(--border);background:var(--bg3)}
.lgi{display:flex;align-items:center;gap:3px;font-family:var(--mono);font-size:7px;color:var(--text2)}
.lgd{width:8px;height:3px;border-radius:1px;flex-shrink:0}
/* SECTIONS */
.sec{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 7px}
.sect{font-family:var(--mono);font-size:8px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.13em}
.secb{font-family:var(--mono);font-size:8px;padding:2px 6px;border-radius:4px;background:var(--bg3);border:1px solid var(--border);color:var(--text2)}
/* TRADE LEVELS */
.rc{margin:0 10px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;box-shadow:var(--shadow)}
.rw{padding:6px 10px}
.ri{display:flex;align-items:center;justify-content:space-between;padding:5px 6px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;border-radius:5px;margin-bottom:1px}
.ri:last-child{border-bottom:none}.ri:hover{background:var(--bg3)}.ri:active{background:var(--bg4);transform:scale(.99)}
.rt{font-family:var(--mono);font-size:8px;font-weight:700;min-width:36px}
.rt.tp3,.rt.tp2,.rt.tp1{color:var(--long)}.rt.entry{color:var(--amber)}.rt.sl,.rt.inv{color:var(--short)}
/* FIX-5: font-size 12 to accommodate wider formatted prices */
.rp{font-family:var(--mono);font-size:12px;font-weight:600;color:var(--text);flex:1;text-align:right;padding-right:7px}
.rpct{font-family:var(--mono);font-size:8px;min-width:52px;text-align:right}
.rcpy{font-size:9px;opacity:0;color:var(--text3);padding:2px 4px;transition:opacity .2s}
.ri:hover .rcpy{opacity:1}
.rftr{display:grid;grid-template-columns:repeat(2,1fr);border-top:1px solid var(--border)}
.rfi{padding:10px 14px;display:flex;flex-direction:column;gap:2px}
.rfi:first-child{border-right:1px solid var(--border)}
.rfl{font-family:var(--mono);font-size:7px;color:var(--text2);text-transform:uppercase;letter-spacing:.08em}
.rfv{font-family:var(--mono);font-size:16px;font-weight:700;color:var(--text)}
.rfv.good{color:var(--long)}
.rrbg{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:4px}
.rrfill{height:100%;background:linear-gradient(90deg,var(--amber),var(--long));width:0%;border-radius:2px;transition:width 1s cubic-bezier(.34,1.56,.64,1) .3s}
/* FIX-9: Position Size Calculator */
.calc-drawer{margin:4px 10px;border-radius:var(--r2);border:1px solid var(--border);background:var(--bg2);overflow:hidden;box-shadow:var(--shadow)}
.calc-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;cursor:pointer;background:var(--bg3);border-bottom:1px solid var(--border)}
.calc-title{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--text2);letter-spacing:.08em;text-transform:uppercase}
.calc-toggle{font-family:var(--mono);font-size:9px;color:var(--blue);font-weight:600}
.calc-body{display:none;padding:12px 14px}
.calc-body.open{display:block}
.calc-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.calc-field{display:flex;flex-direction:column;gap:4px}
.calc-label{font-family:var(--mono);font-size:7px;color:var(--text3);text-transform:uppercase;letter-spacing:.08em}
.calc-input{font-family:var(--mono);font-size:12px;font-weight:600;padding:6px 8px;border-radius:6px;border:1px solid var(--border2);background:var(--bg);color:var(--text);outline:none;width:100%;transition:border-color .15s}
.calc-input:focus{border-color:var(--blue)}
.calc-mode{display:flex;gap:4px;margin-bottom:10px}
.calc-mode-btn{flex:1;padding:5px;border-radius:5px;border:1px solid var(--border2);background:var(--bg);font-family:var(--mono);font-size:8px;font-weight:700;color:var(--text2);cursor:pointer;text-align:center;transition:all .15s}
.calc-mode-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.calc-results{background:var(--bg3);border-radius:var(--r);padding:10px 12px;margin-top:4px}
.calc-result-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid var(--border)}
.calc-result-row:last-child{border-bottom:none}
.calc-result-label{font-family:var(--mono);font-size:8px;color:var(--text2)}
.calc-result-val{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--text)}
.calc-result-val.ok{color:var(--long)}.calc-result-val.warn{color:var(--amber)}.calc-result-val.bad{color:var(--short)}
/* GATES */
.gc{margin:0 10px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:10px;box-shadow:var(--shadow)}
.gg{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.gce{aspect-ratio:1;border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;font-weight:700;position:relative;cursor:pointer;transition:transform .15s}
.gce:active{transform:scale(.88)}
.gce.pass{background:var(--long2);border:1px solid rgba(0,154,82,.25);color:var(--long)}
.gce.fail{background:var(--short2);border:1px solid rgba(217,40,64,.18);color:var(--short)}
.gn{position:absolute;top:2px;left:4px;font-size:6px;opacity:.45;font-weight:400}
/* HMM */
.hc{margin:0 10px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:10px 12px;box-shadow:var(--shadow)}
.ht{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.hs{font-family:var(--mono);font-size:15px;font-weight:700}
.hs.bull,.hs.trending{color:var(--long)}.hs.bear,.hs.volatile{color:var(--short)}.hs.range,.hs.choppy{color:var(--amber)}
.hbw{flex:1;margin-left:12px;display:flex;align-items:center;gap:6px}
.hbb{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.hbf{height:100%;border-radius:2px;width:0%;transition:width 1s cubic-bezier(.34,1.56,.64,1) .5s}
.hbf.bull,.hbf.trending{background:linear-gradient(90deg,#00703a,var(--long))}
.hbf.bear,.hbf.volatile{background:linear-gradient(90deg,#9a0020,var(--short))}
.hbf.range,.hbf.choppy{background:linear-gradient(90deg,#946000,var(--amber))}
.hpct{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--text2)}
.hp{display:flex;gap:3px;align-items:center;flex-wrap:wrap}
.pn{font-family:var(--mono);font-size:7px;font-weight:700;padding:2px 4px;border-radius:3px}
.pn.BULL,.pn.TRENDING{background:var(--long2);color:var(--long);border:1px solid rgba(0,154,82,.2)}
.pn.BEAR,.pn.VOLATILE{background:var(--short2);color:var(--short);border:1px solid rgba(217,40,64,.2)}
.pn.RANGE,.pn.CHOPPY{background:var(--amberBg);color:var(--amber);border:1px solid rgba(192,122,0,.2)}
.pn.curr{box-shadow:0 0 0 1px currentColor}
.mkc{margin:0 10px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:10px 12px;box-shadow:var(--shadow)}
.mk-verdict{font-size:11px;font-weight:600;padding:6px 8px;border-radius:6px;margin-bottom:8px;line-height:1.4}
.mk-confirmed{background:rgba(0,154,82,.12);color:var(--long);border:1px solid rgba(0,154,82,.25)}
.mk-vetoed{background:rgba(217,40,64,.12);color:var(--short);border:1px solid rgba(217,40,64,.25)}
.mk-caution{background:var(--amberBg);color:var(--amber);border:1px solid rgba(192,122,0,.25)}
.mk-neutral{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.mk-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:1px solid var(--border)}
.mk-row:last-child{border-bottom:none}
.mk-lbl{font-size:10px;color:var(--text2)}
.mk-val{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--text1)}
.mk-mod{color:var(--amber)}
.mk-chain{letter-spacing:1px;font-size:9px}
.mk-vel{margin-top:6px;font-size:10px;color:var(--amber);background:var(--amberBg);padding:4px 6px;border-radius:4px}
.pa{color:var(--text3);font-size:8px}
/* GAPS */
.gapc{margin:0 10px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;box-shadow:var(--shadow)}
.gapr{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-bottom:1px solid var(--border)}
.gapr:last-child{border-bottom:none}
.gapsrc{font-family:var(--mono);font-size:9px;color:var(--text);flex:1}
.gapnt{font-family:var(--mono);font-size:7px;color:var(--text2);flex:2;padding:0 6px}
.gapq{font-family:var(--mono);font-size:8px;font-weight:700;padding:2px 6px;border-radius:4px;min-width:50px;text-align:center}
.gapq.FULL{background:var(--long2);color:var(--long);border:1px solid rgba(0,154,82,.2)}
.gapq.PARTIAL{background:var(--amberBg);color:var(--amber);border:1px solid rgba(192,122,0,.2)}
.gapq.PROXY{background:#e8f1ff;color:var(--blue);border:1px solid rgba(26,111,255,.2)}
.gapq.MISSING{background:var(--short2);color:var(--short);border:1px solid rgba(217,40,64,.2)}
/* OCE PIPELINE */
.pc{margin:0 10px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden;box-shadow:var(--shadow)}
.pr{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.pr:last-child{border-bottom:none}.pr:hover{background:var(--bg3)}.pr:active{background:var(--bg4)}
.prl{display:flex;align-items:center;gap:7px}
.pst{font-family:var(--mono);font-size:7px;color:var(--text2);background:var(--bg3);padding:2px 5px;border-radius:3px;border:1px solid var(--border);min-width:42px;text-align:center}
.plbl{font-family:var(--mono);font-size:10px;color:var(--text)}
.prr{display:flex;align-items:center;gap:5px}
.pb{font-family:var(--mono);font-size:8px;font-weight:700;padding:2px 7px;border-radius:4px}
.pb.pass{background:var(--long2);color:var(--long);border:1px solid rgba(0,154,82,.22)}
.pb.warn{background:var(--amberBg);color:var(--amber);border:1px solid rgba(192,122,0,.22)}
.pb.fail{background:var(--short2);color:var(--short);border:1px solid rgba(217,40,64,.22)}
.pb.info{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.pch{color:var(--text3);font-size:10px;transition:transform .2s}
.pr.expanded .pch{transform:rotate(90deg)}
.pd{background:var(--bg3);border-bottom:1px solid var(--border);padding:8px 12px;display:none}
.pd.open{display:block}
/* S4 FIX */
.pdl{font-family:var(--mono);font-size:9px;color:var(--text2);line-height:1.6;white-space:pre-wrap;overflow-wrap:break-word;word-break:break-word}
/* MTF */
.mtfc{margin:0 10px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:9px 12px;box-shadow:var(--shadow)}
.mtfr{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.mtft{font-family:var(--mono);font-size:10px;font-weight:700;padding:4px 9px;border-radius:5px;background:var(--bg);border:1px solid var(--border)}
.mtft.b{border-color:rgba(26,111,255,.4);color:var(--blue)}
.mtft.r{border-color:rgba(192,122,0,.4);color:var(--amber)}
.mtft.e{border-color:rgba(0,154,82,.4);color:var(--long)}
.mtfa{color:var(--text3);font-size:10px}
/* TOAST — S3 FIX */
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--text);color:#fff;font-family:var(--mono);font-size:10px;padding:6px 14px;border-radius:20px;pointer-events:none;opacity:0;transition:opacity .2s,transform .2s;white-space:normal;max-width:calc(100vw - 32px);text-align:center;word-break:break-all;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
/* BOTTOM BAR */
.bbar{position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.97);border-top:1px solid var(--border);padding:9px 14px 14px;display:flex;gap:8px;backdrop-filter:blur(16px);z-index:200;box-shadow:0 -2px 12px rgba(0,0,0,.06);max-width:480px;margin:0 auto;right:max(0px,calc((100vw - 480px)/2));left:max(0px,calc((100vw - 480px)/2))}
.bc{flex:1;padding:10px;border-radius:var(--r);background:var(--bg3);border:1px solid var(--border2);color:var(--text2);font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.bc:active{transform:scale(.97);background:var(--bg4)}
.bc.primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.bc.primary:active{background:#1460e0}
/* LOADER / EMPTY — FIX-4 */
#loader{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:12px}
.ring{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--long);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.lt{font-family:var(--mono);font-size:9px;color:var(--text2);letter-spacing:.1em}

<script>
/* MOP·ICT·QUANT — Trade View v10.3  |  White Theme
   FIX-1 signal-ts · FIX-2 WS-leak guard · FIX-3 canvas-clear
   FIX-4 empty-state CSS · FIX-5 fp-comma · FIX-6 age-badge
   FIX-7 inv-breach warn · FIX-8 copy-all-levels
   FIX-9 pos-calc · FIX-10 TF-persist */

const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); tg.setHeaderColor('#ffffff'); tg.setBackgroundColor('#ffffff'); }

function getSignal() {
  try {
    const r = new URLSearchParams(location.search).get('d');
    if (!r) return null;

    // Decode base64 → raw JSON string, then SANITIZE before JSON.parse.
    // TA fields (hmm_path_str, epistemic_label, brvf_status, gap notes, etc.)
    // can embed \n \r \t \x00 and other control chars that make JSON.parse throw
    // "Bad control character in string literal in JSON at position N".
    // Decode base64 → raw JSON string, then SANITIZE before JSON.parse.
    // FIX: handle both standard base64 (from URL-encoded ?d=) and URL-safe base64
    // Steps: 1) decodeURIComponent restores %2B→+ %2F→/ %3D→=
    //        2) convert URL-safe chars back to standard base64 (- → + _ → /)
    //        3) re-add missing = padding so atob never throws
    let b64 = decodeURIComponent(r)
                .replace(/-/g, '+')
                .replace(/_/g, '/');
    // Re-pad to multiple of 4
    const pad = b64.length % 4;
    if (pad === 2) b64 += '==';
    else if (pad === 3) b64 += '=';
    let jsonStr;
    try {
      jsonStr = atob(b64);
    } catch(_b64e) {
      const note = document.querySelector('#empty div:last-child');
      if (note) note.textContent = 'Decode error: ' + _b64e.message;
      return null;
    }
    jsonStr = jsonStr.replace(/[\u0000-\u001F\u007F\u0080-\u009F]/g, '');

    const raw = JSON.parse(jsonStr);

    // Normalise short-key payload (app.py v10.3 slim format) back to full names
    // so build() works unchanged. If keys are already full-length, pass-through.
    const isSlim = ('state' in raw) || ('gp' in raw) || ('hmm' in raw);
    if (!isSlim) return raw;   // full-key payload (current app.py) — use directly

    const h   = raw.hmm  || {};
    const sp  = raw.sp   || {};
    const ev  = raw.ev   || {};
    const au  = raw.au   || {};
    const bv  = raw.bv   || {};
    const gaps = (raw.gaps || []).map(g => ({
      source:  g.s || '', quality: g.q || '', note: g.n || ''
    }));

    return {
      symbol:       raw.symbol,
      bias:         raw.bias,
      grade:        raw.grade,
      conf:         raw.conf,
      price:        raw.price,
      signal_state: raw.state,
      rr:           raw.rr,
      ote_entry:    raw.oe,
      entry_low:    raw.el,
      entry_high:   raw.eh,
      tp1: raw.tp1, tp2: raw.tp2, tp3: raw.tp3,
      sl1: raw.sl1, inv_sl: raw.inv,
      sl2: raw.sl2, sl3: raw.sl3,
      ote_zone_high: raw.ozh, ote_zone_low: raw.ozl,
      ob_high: raw.obh, ob_low: raw.obl,
      fvg_high: raw.fvh, fvg_low: raw.fvl,
      bos_price: raw.bos, choch: raw.choch,
      bias_tf: raw.btf, ref_tf: raw.rtf, exec_tf: raw.etf,
      trader_type: raw.tt,
      chart_tf: raw.ctf,
      gate_pass: raw.gp || [],
      signal_probability_data: {
        signal_probability_pct: sp.pct  || '--',
        probability_tier:       sp.tier || 'LOW',
      },
      hmm_data: {
        hmm_state:          h.st  || 'RANGE',
        hmm_confidence:     0.5,
        hmm_confidence_pct: h.cp  || '50%',
        hmm_path:           h.p   || [],
        hmm_path_str:       h.ps  || '',
      },
      oce_eval: {
        eval_gate:       ev.g  || '',
        eval_score:      ev.sc || '',
        epistemic_label: ev.el || '',
      },
      oce_audit: {
        audit_result:  au.r  || '',
        d1_functional: au.d1 || '',
        d2_ux:         au.d2 || '',
        d3_qa:         au.d3 || '',
      },
      oce_brvf: {
        brvf_status: bv.s || '',
        brvf_fixes:  bv.f || [],
      },
      oce_gaps:  gaps,
      signal_ts: raw.signal_ts || null,
      markov_data:        raw.markov_data        || {},
      markov_validation:  raw.markov_validation  || {},
      markov_state:       raw.markov_state        || '',
      markov_effective_n: raw.markov_effective_n  || 0,
    };
  } catch(e) {
    // Surface the real decode error so it's reportable
    const note = document.querySelector('#empty div:last-child');
    if (note) note.textContent = 'Decode error: ' + e.message;
    return null;
  }
}

/* FIX-5: fp — thousands separator to match Python fmt_price */
function fp(v) {
  if (v === null || v === undefined || v === '') return '--';
  const f = parseFloat(v);
  if (isNaN(f) || f === 0) return '--';
  if (f >= 10000) return '$' + f.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  if (f >= 100)   return '$' + f.toFixed(2);
  if (f >= 1)     return '$' + f.toFixed(4);
  if (f >= 0.01)  return '$' + f.toFixed(5);
  return '$' + f.toFixed(8);
}

function cpy(v) {
  navigator.clipboard?.writeText(v).catch(()=>{});
  if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
  toast('Copied: ' + v);
}
function toast(m, dur=1800) {
  const el = document.getElementById('toast'); if (!el) return;
  el.textContent = m; el.classList.add('show');
  clearTimeout(el._t); el._t = setTimeout(()=>el.classList.remove('show'), dur);
}
function closeApp() {
  if (tg?.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
  if (tg) tg.close(); else window.history.back();
}
function togglePipe(id) {
  const d=document.getElementById('pd-'+id), r=document.getElementById('pr-'+id);
  if (!d||!r) return;
  if (tg?.HapticFeedback) tg.HapticFeedback.selectionChanged();
  d.classList.toggle('open'); r.classList.toggle('expanded');
}

/* FIX-8: Copy All Levels */
function shareLevels() {
  const s = window._sig; if (!s) return;
  const sym = (s.symbol||'BTC').replace('USDT','') + '/USDT';
  const dir = s.isLong ? 'LONG' : 'SHORT';
  const lines = [
    `${sym} ${dir}  Grade ${s.grade}`,
    `Entry : ${fp(s.entry_mid)}  OTE: ${fp(s.ote_zone_low)}-${fp(s.ote_zone_high)}`,
    `TP1   : ${fp(s.tp1)}`,
    `TP2   : ${fp(s.tp2)}`,
    `TP3   : ${fp(s.tp3)}`,
    `SL1   : ${fp(s.sl1||s.inv)}`,
    s.sl2 ? `SL2   : ${fp(s.sl2)}` : null,
    `R:R   : 1:${parseFloat(s.rr||0).toFixed(2)}`,
    `-- MOP ICT QUANT OCE v10.3`,
  ].filter(Boolean).join('\n');
  navigator.clipboard?.writeText(lines).catch(()=>{});
  if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
  toast('All levels copied!', 2200);
}

/* FIX-6: Age badge */
function _startAgeBadge(signalTs) {
  const el = document.getElementById('age-badge'); if (!el) return;
  function update() {
    if (!signalTs) { el.textContent='—'; el.className='age-badge age-fresh'; return; }
    const mins = Math.floor((Date.now()-signalTs)/60000);
    if (mins<1)       { el.textContent='Just now';           el.className='age-badge age-fresh'; }
    else if (mins<15) { el.textContent=mins+'m ago';         el.className='age-badge age-fresh'; }
    else if (mins<30) { el.textContent='⚠ '+mins+'m ago';   el.className='age-badge age-warn'; }
    else              { el.textContent='🔴 STALE '+mins+'m'; el.className='age-badge age-stale'; }
  }
  update(); setInterval(update, 60000);
}

/* FIX-7: Invalidation breach */
let _invFired = false;
function _checkInv(px) {
  const s = window._sig; if (!s || _invFired) return;
  const inv = s.sl1||s.inv; if (!inv) return;
  const breached = s.isLong ? px < inv : px > inv;
  if (breached) {
    _invFired = true;
    const h = document.getElementById('hero-card');
    if (h) h.classList.add('inv-breach');
    toast('PRICE CROSSED INVALIDATION - Signal may be void', 4000);
    if (tg?.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
  }
}

/* FIX-9: Position Size Calculator */
let _calcMode = 'risk';
function initCalc() {
  document.getElementById('calc-mode-risk')?.addEventListener('click',()=>{ _calcMode='risk'; _syncCalcMode(); updateCalc(); });
  document.getElementById('calc-mode-fixed')?.addEventListener('click',()=>{ _calcMode='fixed'; _syncCalcMode(); updateCalc(); });
  document.getElementById('calc-acct')?.addEventListener('input', updateCalc);
  document.getElementById('calc-risk')?.addEventListener('input', updateCalc);
  document.getElementById('calc-fixed')?.addEventListener('input', updateCalc);
  _syncCalcMode(); updateCalc();
}
function _syncCalcMode() {
  document.getElementById('calc-mode-risk')?.classList.toggle('active',_calcMode==='risk');
  document.getElementById('calc-mode-fixed')?.classList.toggle('active',_calcMode==='fixed');
  const rr=document.getElementById('calc-risk-row'), fr=document.getElementById('calc-fixed-row');
  if(rr) rr.style.display=_calcMode==='risk'?'':'none';
  if(fr) fr.style.display=_calcMode==='fixed'?'':'none';
}
function updateCalc() {
  const s=window._sig; if(!s) return;
  const entry=s.entry_mid||0, sl=s.sl1||s.inv||0;
  if(!entry||!sl) return;
  const dist=Math.abs(entry-sl), distPct=(dist/entry)*100;
  const acct=parseFloat(document.getElementById('calc-acct')?.value)||1000;
  const riskUSD=_calcMode==='risk'
    ? acct*(parseFloat(document.getElementById('calc-risk')?.value)||1)/100
    : parseFloat(document.getElementById('calc-fixed')?.value)||10;
  const posUSD=dist>0?(riskUSD/dist)*entry:0;
  const qty=dist>0?riskUSD/dist:0;
  const rPct=(riskUSD/acct)*100;
  const sym=(s.symbol||'BTC').replace('USDT','');
  function set(id,val,cls='') {
    const el=document.getElementById(id);
    if(el){ el.textContent=val; el.className='calc-result-val'+(cls?' '+cls:''); }
  }
  set('calc-r-pos','$'+posUSD.toLocaleString('en-US',{maximumFractionDigits:0}),posUSD>acct?'warn':'ok');
  set('calc-r-qty',qty.toFixed(qty>=1?3:6)+' '+sym);
  set('calc-r-risk','$'+riskUSD.toFixed(2),rPct>3?'bad':rPct>1.5?'warn':'ok');
  set('calc-r-dist','$'+dist.toLocaleString('en-US',{maximumFractionDigits:2})+' ('+distPct.toFixed(2)+'%)');
}
function toggleCalc() {
  const b=document.getElementById('calc-body'), t=document.getElementById('calc-tgl');
  if(!b) return;
  const open=b.classList.toggle('open');
  if(t) t.textContent=open?'Hide':'Show';
  if(open) updateCalc();
  if(tg?.HapticFeedback) tg.HapticFeedback.selectionChanged();
}

/* FIX-10: TF persistence */
function _saveTF(tf){ try{ sessionStorage.setItem('miq_tf',tf); }catch(e){} }
function _loadTF(){ try{ return sessionStorage.getItem('miq_tf')||'4h'; }catch(e){ return '4h'; } }

function switchTab(which) {
  if (tg?.HapticFeedback) tg.HapticFeedback.selectionChanged();
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+which)?.classList.add('active');
  document.querySelectorAll('.cpanel').forEach(p=>p.classList.remove('vis'));
  document.getElementById(which+'-panel')?.classList.add('vis');
  if (which==='tv' && !window._tvOk) initTV();
  if (which==='ict' && window._sig) {
    if (!window._ictInited) initICT(window._sig);
    else if (!_raf) _raf=requestAnimationFrame(()=>{ _raf=null; drawICT(); });
  }
}

const GNAMES=['Structure Bias','Imbalance/FVG','OB Entry','Liquidity Sweep','Kill Zone','HTF Align','Market Structure','Volume Profile','R:R Floor','Macro Clear'];

/* TRADINGVIEW */
let _tvOk=false;
function initTV() {
  const sig=window._sig; if(!sig||_tvOk) return;
  // Guard: if tv.js hasn't finished loading yet (slow in Telegram WebApp sandbox),
  // poll every 500ms up to 12 times (~6 seconds) before giving up.
  if (typeof TradingView==='undefined'||!TradingView.widget) {
    let n=0;
    const t=setInterval(()=>{
      n++;
      if (typeof TradingView!=='undefined'&&TradingView.widget) { clearInterval(t); initTV(); }
      else if (n>=12) {
        clearInterval(t);
        const c=document.getElementById('tv-container');
        if(c) c.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:400px;flex-direction:column;gap:8px;font-family:var(--mono);font-size:10px;color:var(--text2)"><div style="font-size:24px;opacity:.4">📺</div><div>TradingView script blocked</div><div style="font-size:8px;opacity:.5">Check internet / reload</div></div>';
      }
    },500);
    return;
  }
  const raw=(sig.symbol||'BTCUSDT').toUpperCase().replace('/','').replace('-','');
  const tvSym='BINANCE:'+(raw.endsWith('USDT')?raw:raw+'USDT');
  const tfMap={'1m':'1','5m':'5','15m':'15','15M':'15','30m':'30','1H':'60','1h':'60','2H':'120','4H':'240','4h':'240','6H':'360','12H':'720','1D':'D','1d':'D','1W':'W','1w':'W'};
  const tf=tfMap[sig.chart_tf||sig.exec_tf||'4H']||'240';
  const c=document.getElementById('tv-container'); if(!c) return;
  // Set explicit pixel dimensions — '100%' height fails when parent was hidden
  c.style.cssText='width:100%;height:400px;';
  try {
    new TradingView.widget({
      container:'tv-container',symbol:tvSym,interval:tf,
      timezone:'Etc/UTC',theme:'light',style:'1',locale:'en',
      toolbar_bg:'#f5f7fa',enable_publishing:false,hide_top_toolbar:false,
      save_image:false,allow_symbol_change:false,hide_side_toolbar:false,
      studies:['RSI@tv-studyapi','Volume@tv-studyapi'],
      width:'100%',height:400,
      overrides:{
        'mainSeriesProperties.candleStyle.upColor':'#009a52',
        'mainSeriesProperties.candleStyle.downColor':'#d92840',
        'mainSeriesProperties.candleStyle.borderUpColor':'#009a52',
        'mainSeriesProperties.candleStyle.borderDownColor':'#d92840',
        'mainSeriesProperties.candleStyle.wickUpColor':'#009a52',
        'mainSeriesProperties.candleStyle.wickDownColor':'#d92840',
        'paneProperties.background':'#ffffff',
        'paneProperties.backgroundType':'solid',
        'paneProperties.vertGridProperties.color':'#eef1f6',
        'paneProperties.horzGridProperties.color':'#eef1f6',
        'scalesProperties.textColor':'#5a6e84',
        'scalesProperties.lineColor':'#dde2ea',
      }
    });
    _tvOk=true; // only lock after actual success so tab-switch can retry on failure
  } catch(e) {
    console.warn('[TV]',e);
    _tvOk=false; // allow retry on next tab tap
    c.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:400px;font-family:var(--mono);font-size:10px;color:var(--text2)">Chart error — tap TRADINGVIEW tab to retry</div>';
  }
}

const CC={bg:'#f8fafb',panel:'#eef1f6',grid:'#e4e8f0',text:'#1a2332',dim:'#5a6e84',cyan:'#0088aa',green:'#009a52',red:'#d92840',amber:'#c07a00',ma50:'#c07a00',ma200:'#7a8898',ote:'#1a6fff',sl2:'#e06010',sl3:'#8b2020',be:'#6a7888',draw:'#2aa870',ob:'#b86a00',fvg:'#0088aa',entry:'#009a52',bos:'#009a52',choch:'#c06010'};
let _ws=null,_cds=[],_lx=undefined,_raf=null,_cdot=null,_lpx=null,_act='4h';
window._ictInited=false;
const TFBIN={'1m':'1m','5m':'5m','15m':'15m','30m':'30m','1h':'1h','4h':'4h','1d':'1d'};

function toBinanceSym(raw){ const s=(raw||'BTCUSDT').toUpperCase().replace('/','').replace('-',''); return s.endsWith('USDT')?s:s+'USDT'; }
async function fetchCDs(sym,tf){
  try{
    const r=await fetch(`https://api.binance.com/api/v3/klines?symbol=${toBinanceSym(sym)}&interval=${tf}&limit=80`,{cache:'no-cache'});
    if(!r.ok) return [];
    const d=await r.json();
    return Array.isArray(d)?d.map(k=>({t:+k[0],o:+k[1],h:+k[2],l:+k[3],c:+k[4],v:+k[5]})):[];
  } catch(e){ return []; }
}
function wsConnect(sym,cb){
  /* FIX-2: close existing WS cleanly — nullify onclose before closing to prevent reconnect storm */
  if(_ws){ try{ _ws.onclose=null; _ws.close(); }catch(e){} _ws=null; }
  const ws=new WebSocket(`wss://stream.binance.com:9443/ws/${toBinanceSym(sym).toLowerCase()}@trade`);

function drawICT(){

  const cds=_cds.slice(-60),N=Math.max(cds.length,1),cw=Math.max(2,Math.floor(CW/N)-1);

  if(ap.length<2){const ref=sig.price||2000;ap.push(ref*1.01,ref*0.99)}
  const yMx=Math.max(...ap)*1.003,yMn=Math.min(...ap)*0.997,yR=yMx-yMn||1;
  const py=v=>PT+CH*(1-(v-yMn)/yR),px=i=>PL+(i+0.5)*CW/N;
  ctx.fillStyle=CC.bg; ctx.fillRect(0,0,W,H);

  }
  function shade(lo,hi,c,a,lbl){

  const vB=H-5,vHpx=vB-(H-PB+3),mxV=Math.max(...cds.map(c=>c.v),1);

function renderPCA(d) {
  const pts = d.pca_points || [];
  const cv = document.getElementById('pca-cv');
  if (!cv || !pts.length) return;
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const W = cv.offsetWidth || 280, H = 160;
  cv.width = W * dpr; cv.height = H * dpr;
  cv.style.width = W + 'px'; cv.style.height = H + 'px';
  const ctx = cv.getContext('2d');
  ctx.scale(dpr, dpr);
  ctx.fillStyle = '#f5f7fa'; ctx.fillRect(0, 0, W, H);

  const xs = pts.map(p => p.x), ys = pts.map(p => p.y);
  const xMin = Math.min(...xs), xMax = Math.max(...xs) || 1;
  const yMin = Math.min(...ys), yMax = Math.max(...ys) || 1;
  const pad = 16;
  const sx = v => pad + ((v - xMin) / (xMax - xMin || 1)) * (W - pad * 2);
  const sy = v => H - pad - ((v - yMin) / (yMax - yMin || 1)) * (H - pad * 2);

  const C_MAP = { TP1:'#009a52', TP2:'#009a52', TP3:'#009a52', SL:'#d92840', TIMEOUT:'#9aaabb' };
  pts.forEach(p => {
    const x = sx(p.x), y = sy(p.y);
    ctx.beginPath();
    if (p.current) {
      ctx.arc(x, y, 6, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(26,111,255,0.15)'; ctx.fill();
      ctx.strokeStyle = '#1a6fff'; ctx.lineWidth = 2; ctx.stroke();
    } else {
      ctx.arc(x, y, 4, 0, Math.PI * 2);
      ctx.fillStyle = C_MAP[p.outcome] || '#9aaabb'; ctx.globalAlpha = 0.75; ctx.fill(); ctx.globalAlpha = 1;
    }
  });
}

  const gp=d.gate_pass||[],gc=gp.filter(Boolean).length;
  const sp=d.signal_probability_data||{};
  const pp=sp.signal_probability_pct||'--',pt=(sp.probability_tier||'LOW').toLowerCase();
  const rr=parseFloat(d.rr||0).toFixed(2);
  const state=(d.signal_state||'BLOCKED').toLowerCase();
  const sc=state==='active'?'active':state==='deferred'?'deferred':'blocked';
  const sl2lbl=state==='active'?'● ACTIVE':state==='deferred'?'◐ DEFERRED':'✕ BLOCKED';
  const grClr={S:'var(--long)',A:'var(--long)',B:'var(--amber)',C:'var(--text2)',D:'var(--short)',F:'var(--short)'}[grade]||'var(--text2)';
  const ptCl=pt==='high'?'g':pt==='moderate'?'a':'r';
  const hmm=d.hmm_data||{},hs=(hmm.hmm_state||'RANGE').toLowerCase(),hp=(hmm.hmm_path||[]).slice(-8);
  const gps=d.oce_gaps||[],ev=d.oce_eval||{},au=d.oce_audit||{},br=d.oce_brvf||{};
  const btf=d.bias_tf||'',rtf=d.ref_tf||'',etf=d.exec_tf||'',tt=(d.trader_type||'').split('(')[0].trim();
  const em=parseFloat(d.ote_entry||((parseFloat(d.entry_low||0)+parseFloat(d.entry_high||0))/2))||0;

  function pct(price,ref,up){
    if(!price||!ref)return{s:'',c:'var(--text3)'};
    const df=((price-ref)/ref)*100,isP=up?df>0:df<0;
    return{s:(df>=0?'+':'')+df.toFixed(2)+'%',c:isP?'var(--long)':'var(--short)'};
  }
  const t3p=pct(d.tp3,em,isLong),t2p=pct(d.tp2,em,isLong),t1p=pct(d.tp1,em,isLong);
  const slp=pct(d.sl1??d.inv_sl,em,!isLong); /* S1 FIX: ?? not || */

  function lvl(tag,cls,price,p){
    const raw=parseFloat(price)||0; if(!raw)return'';
    return `<div class="ri" onclick="cpy('${fp(raw)}')">`+
      `<span class="rt ${cls}">${tag}</span><span class="rp">${fp(raw)}</span>`+
      (p?.s?`<span class="rpct" style="color:${p.c}">${p.s}</span>`:'<span class="rpct"></span>')+
      `<span class="rcpy">⎘</span></div>`;
  }
  const gates=gp.map((pass,i)=>`<div class="gce ${pass?'pass':'fail'}" onclick="toast('G${i+1}: ${GNAMES[i]||'Gate'+(i+1)}')">`+`<span class="gn">${i+1}</span>${pass?'✓':'✕'}</div>`).join('');
  const pnodes=hp.map((s,i,a)=>`<span class="pn ${s}${i===a.length-1?' curr':''}">${s}</span>`+(i<a.length-1?'<span class="pa">›</span>':'')).join('');
  const grs=gps.map(g=>`<div class="gapr"><span class="gapsrc">${g.source||'—'}</span>`+`<span class="gapnt">${(g.note||'').slice(0,26)}</span>`+`<span class="gapq ${g.quality}">${g.quality}</span></div>`).join('');
  const pipes=[
    {id:'hmm',st:'ST.1',lb:'HMM Regime',val:hmm.hmm_state||'—',cls:['bull','trending'].includes(hs)?'pass':['bear','volatile'].includes(hs)?'fail':'warn',det:`State  : ${hmm.hmm_state||'—'}\nConf   : ${hmm.hmm_confidence_pct||'—'}\nPath   : ${hmm.hmm_path_str||'—'}`},
    {id:'eval',st:'ST.4.8',lb:'Eval Gate',val:ev.eval_gate||'—',cls:ev.eval_gate==='PASS'?'pass':'fail',det:`Gate   : ${ev.eval_gate||'—'}\nScore  : ${ev.eval_score||'—'}\nLabel  : ${ev.epistemic_label||'—'}`},
    {id:'audit',st:'ST.4.9',lb:'Code Audit',val:au.audit_result||'—',cls:au.audit_result==='PASS'?'pass':au.audit_result?.includes('NOTES')?'warn':'fail',det:`D1 Func: ${au.d1_functional||'—'}\nD2 UX  : ${au.d2_ux||'—'}\nD3 QA  : ${au.d3_qa||'—'}`},
    {id:'brvf',st:'BRVF',lb:'BRVF Loop',val:br.brvf_status||'—',cls:br.brvf_status?.includes('PASS')?'pass':br.brvf_status==='ERROR'?'fail':'warn',det:`Status : ${br.brvf_status||'—'}\nFixes  : ${(br.brvf_fixes||[]).join(', ')||'none'}`},
  ].map(p=>`<div><div class="pr" id="pr-${p.id}" onclick="togglePipe('${p.id}')"><div class="prl"><span class="pst">${p.st}</span><span class="plbl">${p.lb}</span></div><div class="prr"><span class="pb ${p.cls}">${p.val}</span><span class="pch">›</span></div></div><div class="pd" id="pd-${p.id}"><div class="pdl">${p.det}</div></div></div>`).join('');

  window._sig={
    ...d,isLong,
    tp1:+d.tp1||0,tp2:+d.tp2||0,tp3:+d.tp3||0,
    sl1:+(d.sl1??d.inv_sl)||0,sl2:+d.sl2||0,sl3:+d.sl3||0,inv:+d.inv_sl||0,
    entry_mid:em,entry_low:+d.entry_low||0,entry_high:+d.entry_high||0,
    ob_high:+d.ob_high||0,ob_low:+d.ob_low||0,
    fvg_high:+d.fvg_high||0,fvg_low:+d.fvg_low||0,
    ote_zone_low:+(d.ote_zone_low||d.entry_low)||0,
    ote_zone_high:+(d.ote_zone_high||d.entry_high)||0,
    bos_price:+d.bos_price||0,choch:!!d.choch,
    price:+d.price||0,grade,conf,rr,
    gate_pass:gp,signal_probability_data:sp,
    oce_eval:ev,oce_audit:au,hmm_data:hmm,
    chart_tf:d.chart_tf||d.exec_tf||'4H',
    gate_fp_data: d.gate_fp_data||{},          // [MOP-P09]
    gate11_detail: d.gate11_detail||{},         // [MOP-P09]
    gate_scores: d.gate_scores||[],             // [MOP-P09]
    crowd_data: d.crowd_data||{},               // [MOP-P10]
    pca_points: d.pca_points||[],               // [MOP-P10]
  };

  return `
  <div class="hdr fi">
    <div class="hdr-left">
      <span class="hdr-logo">MOP·ICT·QUANT</span><div class="ldot" id="ldot"></div>
      <span class="age-badge age-fresh" id="age-badge">…</span>
    </div>
    <div style="text-align:right"><div class="hdr-px" id="live-px">${fp(d.price)}</div><div class="hdr-chg">Live · ${sym}</div></div>
    <span class="hdr-ver">OCE v10.3</span>
  </div>
  <div class="hero ${dc} fi fi1" id="hero-card">
    <div class="hero-glow"></div>
    <div class="hero-top"><div style="display:flex;align-items:center"><span class="dchip">${dl}</span><span class="hsym">${sym}</span></div></div>
    <div class="hm">
      <div class="mc"><span class="ml">Grade</span><span class="mv" style="color:${grClr}">${grade}</span></div>
      <div class="mc"><span class="ml">Gates</span><span class="mv ${gc===10?'g':gc>=7?'a':'r'}">${gc}/10</span></div>
      <div class="mc"><span class="ml">Prob</span><span class="mv ${ptCl}">${pp}</span></div>
    </div>
  </div>
  <div class="state ${sc} fi fi1">
    <div style="display:flex;align-items:center"><span class="sdot"></span><span class="slbl">${sl2lbl}</span></div>
    <span class="sev">${ev.epistemic_label||'—'}</span>
  </div>
  <div class="tabs fi fi2">
    <button class="tab active" id="tab-ict" onclick="switchTab('ict')">📈 LIVE ICT CHART</button>
    <button class="tab" id="tab-tv" onclick="switchTab('tv')">📺 TRADINGVIEW</button>
  </div>
  <div class="cpanel vis fi fi2" id="ict-panel">
    <div class="ict-bar">
      <div class="tfbtns">
        <button class="tfb" data-tf="1m" onclick="changeTF('1m',this)">1m</button>
        <button class="tfb" data-tf="5m" onclick="changeTF('5m',this)">5m</button>
        <button class="tfb" data-tf="15m" onclick="changeTF('15m',this)">15m</button>
        <button class="tfb" data-tf="1h" onclick="changeTF('1h',this)">1H</button>
        <button class="tfb active" data-tf="4h" onclick="changeTF('4h',this)">4H</button>
        <button class="tfb" data-tf="1d" onclick="changeTF('1d',this)">1D</button>
      </div>
      <div class="cst"><div class="cdot" id="conn-dot"></div><span id="conn-lbl">Connecting...</span></div>
    </div>
    <div id="ict-wrap"><canvas id="ict-cv"></canvas></div>
    <div class="lgrow">
      ${[['#b86a00','OB'],['#0088aa','FVG'],['#1a6fff','OTE'],['#009a52','TP'],['#d92840','SL1'],['#e06010','SL2'],['#8b2020','SL3'],['#2aa870','DRAW'],['#c07a00','MA20'],['#7a8898','MA50']].map(([c,l])=>`<div class="lgi"><div class="lgd" style="background:${c}"></div><span>${l}</span></div>`).join('')}
    </div>
  </div>
  <div class="cpanel fi fi2" id="tv-panel" style="height:400px"><div id="tv-container"></div></div>
  ${btf||rtf||etf?`<div class="sec fi fi3"><span class="sect">Multi-Timeframe</span>${tt?`<span class="secb">${tt}</span>`:''}</div><div class="mtfc fi fi3"><div class="mtfr">${btf?`<span class="mtft b">${btf}</span><span class="mtfa">→</span>`:''}${rtf?`<span class="mtft r">${rtf}</span><span class="mtfa">→</span>`:''}${etf?`<span class="mtft e">${etf}</span>`:''}</div></div>`:''}
  <div class="sec fi fi3"><span class="sect">Trade Levels</span><span class="secb">Tap to copy</span></div>
  <div class="rc fi fi3">
    <div class="rw">${lvl('TP3','tp3',d.tp3,t3p)}${lvl('TP2','tp2',d.tp2,t2p)}${lvl('TP1','tp1',d.tp1,t1p)}${lvl('ENTRY','entry',em,null)}${lvl('SL','sl',d.sl1??d.inv_sl,slp)}${lvl('INVAL','inv',d.inv_sl,null)}</div>
    <div class="rftr">
      <div class="rfi"><span class="rfl">R:R Ratio</span><span class="rfv ${parseFloat(rr)>=2?'good':''}">${rr}</span><div class="rrbg"><div class="rrfill" id="rrBar"></div></div></div>
      <div class="rfi"><span class="rfl">Confidence</span><span class="rfv">${conf}<span style="font-size:9px;color:var(--text2)">/100</span></span></div>
    </div>
  </div>
  <div class="calc-drawer fi fi3">
    <div class="calc-hdr" onclick="toggleCalc()">
      <span class="calc-title">📐 Position Size Calculator</span>
      <span id="calc-tgl" class="calc-toggle">Show</span>
    </div>
    <div class="calc-body" id="calc-body">
      <div class="calc-mode">
        <div class="calc-mode-btn active" id="calc-mode-risk">% Risk</div>
        <div class="calc-mode-btn" id="calc-mode-fixed">Fixed $</div>
      </div>
      <div class="calc-row">
        <div class="calc-field"><span class="calc-label">Account (USD)</span><input class="calc-input" id="calc-acct" type="number" value="1000" min="1" step="100"></div>
        <div class="calc-field" id="calc-risk-row"><span class="calc-label">Risk %</span><input class="calc-input" id="calc-risk" type="number" value="1" min="0.1" max="100" step="0.1"></div>
        <div class="calc-field" id="calc-fixed-row" style="display:none"><span class="calc-label">Risk Amount ($)</span><input class="calc-input" id="calc-fixed" type="number" value="10" min="1" step="1"></div>
      </div>
      <div class="calc-results">
        <div class="calc-result-row"><span class="calc-result-label">Position Size</span><span class="calc-result-val" id="calc-r-pos">—</span></div>
        <div class="calc-result-row"><span class="calc-result-label">Quantity</span><span class="calc-result-val" id="calc-r-qty">—</span></div>
        <div class="calc-result-row"><span class="calc-result-label">Risk in USD</span><span class="calc-result-val" id="calc-r-risk">—</span></div>
        <div class="calc-result-row"><span class="calc-result-label">SL Distance</span><span class="calc-result-val" id="calc-r-dist">—</span></div>
      </div>
    </div>
  </div>
  <div class="sec fi fi4"><span class="sect">10-Gate Dashboard</span><span class="secb">${gc}/${gp.length} Pass</span></div>
  <div class="gc fi fi4"><div class="gg">${gates}</div></div>
  ${buildGate11(d)}
  ${buildFingerprint(d)}
  ${buildCrowd(d)}
  <div class="jrnl-drawer fi fi4">
    <div class="jrnl-hdr" onclick="toggleJrnl()">
      <span class="jrnl-title">📓 Trade Journal</span>
      <span id="jrnl-tgl" class="jrnl-toggle">Log</span>
    </div>
    <div class="jrnl-body" id="jrnl-body">
      <div class="jrnl-btns">
        <div class="jb" id="jb-took" onclick="jSelect('took')">✅ Took Trade</div>
        <div class="jb" id="jb-skip" onclick="jSelect('skip')">⏭ Skipped</div>
      </div>
      <div class="jrnl-outcomes" id="jrnl-outcomes">
        <div class="job" onclick="submitJournal('TP1')" style="color:var(--long)">Hit TP1</div>
        <div class="job" onclick="submitJournal('TP2')" style="color:var(--long)">Hit TP2</div>
        <div class="job" onclick="submitJournal('TP3')" style="color:var(--long)">Hit TP3 🎯</div>
        <div class="job" onclick="submitJournal('SL')"  style="color:var(--short)">Hit Stop Loss</div>
        <div class="job" onclick="submitJournal('TIMEOUT')" style="color:var(--text2)">Timed Out / Manual Exit</div>
      </div>
      <div class="jrnl-sent" id="jrnl-sent"></div>
    </div>
  </div>
  ${buildPCA(d)}
  <div class="sec fi fi4"><span class="sect">HMM Regime — Viterbi</span><span class="secb">${hp.length} bars</span></div>
  <div class="hc fi fi4">
    <div class="ht"><span class="hs ${hs}">${hmm.hmm_state||'RANGE'}</span>
      <div class="hbw"><div class="hbb"><div class="hbf ${hs}" id="hmmBar"></div></div><span class="hpct">${hmm.hmm_confidence_pct||'—'}</span></div>
    </div>
    <div class="hp">${pnodes}</div>
  </div>
  ${gps.length?`<div class="sec fi fi5"><span class="sect">Gap Detection</span><span class="secb">${gps.filter(g=>g.quality==='FULL').length}/8 Full</span></div><div class="gapc fi fi5">${grs}</div>`:''}
  ${buildMarkov(d)}
  <div class="sec fi fi5"><span class="sect">OCE Pipeline</span><span class="secb">Stage 4.9</span></div>
  <div class="pc fi fi5">${pipes}</div>
  <div style="height:6px"></div>`;
}

function buildMarkov(d) {
  const mv = d.markov_data || {};
  const vl = d.markov_validation || {};
  const st = d.markov_state || mv.markov_state || '';
  const effN = d.markov_effective_n || mv.markov_effective_n || 0;
  const alpha = Math.min(1.0, effN / 100).toFixed(2);
  const vkey = vl.validator_verdict_key || 'NEUTRAL';
  const verdict = vl.validator_verdict || (st ? `🎲 Markov: ${st}` : '🎲 Markov: no data');
  const mod = vl.validator_conf_mod != null ? vl.validator_conf_mod : 1.0;
  const chain = vl.validator_gate_chain || '';
  const nSamp = vl.validator_n_samples || 0;
  const bulledge = vl.validator_bull_edge != null ? (vl.validator_bull_edge*100).toFixed(1)+'%' : '—';
  const veto = vl.validator_gate_veto ? '⛔ VETO' : '✅ OK';
  const velFlag = vl.validator_velocity_flag;
  const velNote = vl.validator_velocity_note || '';
  const vCls = vkey==='CONFIRMED'?'mk-confirmed':vkey==='VETOED'||vkey==='FOMC_BLOCKED'?'mk-vetoed':vkey==='CAUTION'?'mk-caution':'mk-neutral';
  if (!st && nSamp === 0) return '';
  return `
  <div class="sec fi fi5"><span class="sect">🎲 Markov Chain</span><span class="secb">α=${alpha} · n=${nSamp}</span></div>
  <div class="mkc fi fi5">
    <div class="mk-verdict ${vCls}">${verdict}</div>
    <div class="mk-row"><span class="mk-lbl">State</span><span class="mk-val">${st||'—'}</span></div>
    <div class="mk-row"><span class="mk-lbl">Conf Mod</span><span class="mk-val mk-mod">${mod.toFixed(2)}×</span></div>
    <div class="mk-row"><span class="mk-lbl">Bull Edge</span><span class="mk-val">${bulledge}</span></div>
    <div class="mk-row"><span class="mk-lbl">Gate Chain</span><span class="mk-val mk-chain">${chain||'—'}</span></div>
    <div class="mk-row"><span class="mk-lbl">Gate Veto</span><span class="mk-val">${veto}</span></div>
    ${velFlag?`<div class="mk-vel">${velNote}</div>`:''}
  </div>`;
}

function runAnims(d) {
  const rr=Math.min(100,(parseFloat(d.rr||0)/3)*100);
  setTimeout(()=>{const b=document.getElementById('rrBar');if(b)b.style.width=rr+'%'},400);
  const hc=parseFloat((d.hmm_data||{}).hmm_confidence||0.5)*100;
  setTimeout(()=>{const b=document.getElementById('hmmBar');if(b)b.style.width=hc+'%'},600);
  setTimeout(()=>{if(window._sig)initICT(window._sig)},350);
  _startAgeBadge(d.signal_ts||null); /* FIX-6 */
  setTimeout(()=>initCalc(),100);   /* FIX-9 */
  setTimeout(()=>renderPCA(d),500); /* [MOP-P10] PCA scatter */
}

function init() {
  const d = getSignal();
  setTimeout(() => {
    document.getElementById('loader').style.display = 'none';
    if (!d) {
      document.getElementById('empty').classList.add('show'); /* FIX-4 */
      return;
    }
    const c = document.getElementById('content');
    c.innerHTML = build(d); c.style.display = 'block';
    runAnims(d);
  }, 400);
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
