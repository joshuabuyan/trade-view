# render.yaml — Render deployment configuration for TA Server
# ─────────────────────────────────────────────────────────────
# How to deploy:
#   1. Push render_ta_server/ folder to a GitHub repo (e.g. cryptex-ta-server)
#   2. Go to https://dashboard.render.com → New → Web Service
#   3. Connect your GitHub repo
#   4. Render auto-detects this render.yaml
#
# OR manually set on Render dashboard:
#   Build Command : pip install -r requirements_ta_server.txt
#   Start Command : uvicorn ta_server:app --host 0.0.0.0 --port $PORT
#   Plan          : Free (or Starter for no cold starts)

services:
  - type: web
    name: cryptex-ta-server
    env: python
    region: oregon          # pick closest to your fps.ms server
    plan: free              # upgrade to "starter" ($7/mo) to eliminate cold starts
    buildCommand: pip install -r requirements_ta_server.txt
    startCommand: uvicorn ta_server:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health

    # ── Environment variables ──────────────────────────────────────────────
    # Set these in Render Dashboard → Environment tab (NOT in this file for security)
    #
    # TA_API_SECRET   = <your-secret-token>   (match with fps.ms TA_API_SECRET)
    #
    # The Render URL will look like:
    #   https://cryptex-ta-server.onrender.com
    # Copy that URL into your fps.ms .env as:
    #   TA_SERVER_URL=https://cryptex-ta-server.onrender.com

    autoDeploy: true
