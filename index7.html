<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0f172a">
<meta name="color-scheme" content="light dark">
<title>MOP·ICT·QUANT — Live Signal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root{
  /* Premium Design System */
  --bg: #fafbfc;
  --bg-elevated: #ffffff;
  --bg-subtle: #f4f6f8;
  --bg-surface: rgba(255,255,255,0.7);
  
  --border: rgba(148, 163, 184, 0.15);
  --border-strong: rgba(148, 163, 184, 0.25);
  
  /* Institutional Color Palette */
  --long: #059669;
  --long-light: #d1fae5;
  --long-glow: rgba(5, 150, 105, 0.15);
  
  --short: #dc2626;
  --short-light: #fee2e2;
  --short-glow: rgba(220, 38, 38, 0.15);
  
  --accent: #0ea5e9;
  --accent-light: #e0f2fe;
  --warning: #d97706;
  --warning-light: #fef3c7;
  
  --text-primary: #0f172a;
  --text-secondary: #475569;
  --text-tertiary: #94a3b8;
  
  /* Typography */
  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
  
  /* Spacing */
  --space-xs: 4px;
  --space-sm: 8px;
  --space-md: 12px;
  --space-lg: 16px;
  --space-xl: 24px;
  
  /* Effects */
  --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.03);
  --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
  --shadow-lg: 0 10px 15px -3px rgb(0 0 0 / 0.08), 0 4px 6px -4px rgb(0 0 0 / 0.05);
  --shadow-glow: 0 0 0 3px var(--long-glow);
  
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
  --radius-xl: 20px;
  
  /* Transitions */
  --transition-fast: 150ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-base: 250ms cubic-bezier(0.4, 0, 0.2, 1);
  --transition-spring: 400ms cubic-bezier(0.34, 1.56, 0.64, 1);
}

/* Dark Mode - Bloomberg Terminal Inspired */
body.dark-mode {
  --bg: #0b0f17;
  --bg-elevated: #111827;
  --bg-subtle: #1e293b;
  --bg-surface: rgba(30, 41, 59, 0.6);
  
  --border: rgba(148, 163, 184, 0.1);
  --border-strong: rgba(148, 163, 184, 0.2);
  
  --text-primary: #f8fafc;
  --text-secondary: #cbd5e1;
  --text-tertiary: #64748b;
  
  --long: #10b981;
  --long-light: rgba(16, 185, 129, 0.15);
  --short: #f87171;
  --short-light: rgba(248, 113, 113, 0.15);
  --accent: #38bdf8;
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

html{font-size:16px;scroll-behavior:smooth}
body{
  background:var(--bg);
  color:var(--text-primary);
  font-family:var(--font-sans);
  min-height:100vh;
  overflow-x:hidden;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}

/* Custom Scrollbar */
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--text-tertiary);border-radius:3px;opacity:0.5}

#app{max-width:480px;margin:0 auto;padding-bottom:100px;position:relative}

/* Glassmorphism Header */
.hdr{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:16px 20px;
  position:sticky;
  top:0;
  z-index:200;
  background:var(--bg-surface);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border-bottom:1px solid var(--border);
}

.hdr-left{display:flex;align-items:center;gap:10px}

.brand{
  display:flex;
  flex-direction:column;
  gap:2px;
}

.hdr-logo{
  font-family:var(--font-mono);
  font-size:11px;
  font-weight:700;
  color:var(--text-primary);
  letter-spacing:0.1em;
  text-transform:uppercase;
}

.hdr-sub{
  font-size:9px;
  color:var(--text-tertiary);
  font-weight:500;
  letter-spacing:0.05em;
}

.ldot{
  width:6px;
  height:6px;
  border-radius:50%;
  background:var(--long);
  box-shadow:0 0 8px var(--long);
  animation:pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
  position:relative;
}

.ldot::after{
  content:'';
  position:absolute;
  inset:-4px;
  border-radius:50%;
  border:1px solid var(--long);
  opacity:0.4;
  animation:ripple 2s cubic-bezier(0, 0.2, 0.8, 1) infinite;
}

@keyframes pulse{
  0%,100%{opacity:1;transform:scale(1)}
  50%{opacity:0.7;transform:scale(0.95)}
}

@keyframes ripple{
  0%{transform:scale(1);opacity:0.4}
  100%{transform:scale(2.5);opacity:0}
}

.ldot.off{background:var(--text-tertiary);box-shadow:none;animation:none}
.ldot.off::after{display:none}

.hdr-right{
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:2px;
}

.hdr-px{
  font-family:var(--font-mono);
  font-size:18px;
  font-weight:700;
  color:var(--text-primary);
  letter-spacing:-0.02em;
}

.hdr-chg{
  font-family:var(--font-mono);
  font-size:10px;
  font-weight:600;
  color:var(--text-tertiary);
  display:flex;
  align-items:center;
  gap:4px;
}

.version-badge{
  position:absolute;
  right:20px;
  top:50%;
  transform:translateY(-50%);
  font-family:var(--font-mono);
  font-size:9px;
  color:var(--text-tertiary);
  background:var(--bg-subtle);
  padding:3px 6px;
  border-radius:4px;
  border:1px solid var(--border);
  opacity:0.7;
}

/* Age Badge */
.age-badge{
  font-family:var(--font-mono);
  font-size:9px;
  font-weight:700;
  padding:3px 8px;
  border-radius:12px;
  border:1px solid;
  margin-left:8px;
  transition:all var(--transition-base);
  text-transform:uppercase;
  letter-spacing:0.03em;
}

.age-fresh{
  background:var(--long-light);
  color:var(--long);
  border-color:var(--long);
  box-shadow:0 0 0 3px var(--long-glow);
}

.age-warn{
  background:var(--warning-light);
  color:var(--warning);
  border-color:var(--warning);
}

.age-stale{
  background:var(--short-light);
  color:var(--short);
  border-color:var(--short);
  animation:pulse-alert 1.5s ease-in-out infinite;
}

@keyframes pulse-alert{
  0%,100%{opacity:1}
  50%{opacity:0.6}
}

/* Hero Card - Glass Morphism */
.hero{
  margin:20px 20px 0;
  border-radius:var(--radius-xl);
  border:1px solid var(--border);
  overflow:hidden;
  position:relative;
  background:var(--bg-elevated);
  box-shadow:var(--shadow-lg);
  transition:all var(--transition-base);
}

.hero::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(135deg, transparent 0%, rgba(255,255,255,0.03) 100%);
  pointer-events:none;
}

.hero.long{
  border-left:3px solid var(--long);
  box-shadow:var(--shadow-lg), inset 4px 0 0 0 var(--long);
}

.hero.short{
  border-left:3px solid var(--short);
  box-shadow:var(--shadow-lg), inset 4px 0 0 0 var(--short);
}

.hero.inv-breach{
  border-color:var(--short);
  box-shadow:0 0 0 4px var(--short-glow), var(--shadow-lg);
  animation:alert-flash 1s ease-in-out 3;
}

@keyframes alert-flash{
  0%,100%{box-shadow:0 0 0 4px var(--short-glow), var(--shadow-lg)}
  50%{box-shadow:0 0 0 8px rgba(220,38,38,0.1), var(--shadow-lg)}
}

.hero-glow{
  position:absolute;
  inset:0;
  pointer-events:none;
  opacity:0.03;
  background:radial-gradient(ellipse 80% 50% at 20% 50%, currentColor 0%, transparent 70%);
}

.hero.long .hero-glow{color:var(--long)}
.hero.short .hero-glow{color:var(--short)}

.hero-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:20px 22px 16px;
}

.dchip{
  font-family:var(--font-mono);
  font-size:10px;
  font-weight:800;
  padding:6px 14px;
  border-radius:20px;
  letter-spacing:0.08em;
  text-transform:uppercase;
  backdrop-filter:blur(10px);
  border:1px solid;
}

.long .dchip{
  background:var(--long-light);
  color:var(--long);
  border-color:var(--long);
  box-shadow:0 2px 8px var(--long-glow);
}

.short .dchip{
  background:var(--short-light);
  color:var(--short);
  border-color:var(--short);
  box-shadow:0 2px 8px var(--short-glow);
}

.hsym{
  font-family:var(--font-mono);
  font-size:22px;
  font-weight:800;
  color:var(--text-primary);
  margin-left:12px;
  letter-spacing:-0.02em;
}

/* Metrics Grid */
.hm{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:12px;
  padding:0 20px 20px;
}

.mc{
  background:var(--bg-subtle);
  border-radius:var(--radius-md);
  padding:14px 10px;
  text-align:center;
  border:1px solid var(--border);
  transition:all var(--transition-fast);
  position:relative;
  overflow:hidden;
}

.mc::before{
  content:'';
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:2px;
  background:currentColor;
  opacity:0.3;
}

.mc:hover{
  transform:translateY(-2px);
  box-shadow:var(--shadow-md);
}

.ml{
  font-family:var(--font-mono);
  font-size:9px;
  color:var(--text-tertiary);
  text-transform:uppercase;
  letter-spacing:0.08em;
  display:block;
  margin-bottom:4px;
  font-weight:600;
}

.mv{
  font-family:var(--font-mono);
  font-size:16px;
  font-weight:800;
  display:block;
  letter-spacing:-0.01em;
}

.mv.g{color:var(--long)}
.mv.r{color:var(--short)}
.mv.a{color:var(--warning)}

/* State Indicator - Premium */
.state{
  margin:12px 20px 0;
  padding:14px 18px;
  border-radius:var(--radius-lg);
  display:flex;
  align-items:center;
  justify-content:space-between;
  border:1px solid;
  position:relative;
  overflow:hidden;
}

.state::before{
  content:'';
  position:absolute;
  left:0;
  top:0;
  bottom:0;
  width:3px;
}

.state.active{
  background:var(--long-light);
  border-color:rgba(5,150,105,0.2);
  color:var(--long);
}

.state.active::before{background:var(--long)}

.state.blocked{
  background:var(--short-light);
  border-color:rgba(220,38,38,0.2);
  color:var(--short);
}

.state.blocked::before{background:var(--short)}

.state.deferred{
  background:var(--warning-light);
  border-color:rgba(217,119,6,0.2);
  color:var(--warning);
}

.state.deferred::before{background:var(--warning)}

.sdot{
  width:8px;
  height:8px;
  border-radius:50%;
  margin-right:10px;
  display:inline-block;
  position:relative;
}

.active .sdot{
  background:var(--long);
  box-shadow:0 0 0 3px var(--long-glow);
  animation:pulse 2s infinite;
}

.blocked .sdot{background:var(--short)}
.deferred .sdot{background:var(--warning)}

.slbl{
  font-family:var(--font-mono);
  font-size:11px;
  font-weight:800;
  letter-spacing:0.05em;
  text-transform:uppercase;
}

.sev{
  font-family:var(--font-mono);
  font-size:10px;
  font-weight:600;
  opacity:0.8;
}

/* Tab Navigation - Pill Style */
.tabs{
  display:flex;
  gap:8px;
  margin:20px 20px 0;
  padding:4px;
  background:var(--bg-subtle);
  border-radius:var(--radius-xl);
  border:1px solid var(--border);
  position:relative;
}

.tab{
  flex:1;
  padding:12px 4px;
  text-align:center;
  cursor:pointer;
  font-family:var(--font-mono);
  font-size:10px;
  font-weight:700;
  letter-spacing:0.03em;
  color:var(--text-tertiary);
  border:none;
  background:transparent;
  outline:none;
  transition:all var(--transition-fast);
  border-radius:var(--radius-lg);
  position:relative;
  z-index:1;
  white-space:nowrap;
}

.tab.active{
  color:var(--text-primary);
  background:var(--bg-elevated);
  box-shadow:var(--shadow-sm);
}

.tab:active{transform:scale(0.97)}

/* Content Panels */
.cpanel{
  margin:0 20px;
  background:var(--bg-elevated);
  border:1px solid var(--border);
  border-radius:0 0 var(--radius-xl) var(--radius-xl);
  overflow:hidden;
  display:none;
  box-shadow:var(--shadow-md);
}

.cpanel.vis{display:block;animation:fadeIn 0.4s ease}

@keyframes fadeIn{
  from{opacity:0;transform:translateY(-10px)}
  to{opacity:1;transform:translateY(0)}
}

/* Dashboard Tab */
.db-wrap{padding:20px;display:flex;flex-direction:column;gap:16px}

.db-section{
  background:var(--bg);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  padding:18px;
  position:relative;
  transition:all var(--transition-fast);
}

.db-section:hover{
  border-color:var(--border-strong);
  transform:translateY(-1px);
  box-shadow:var(--shadow-sm);
}

.db-sec-title{
  font-family:var(--font-mono);
  font-size:10px;
  font-weight:800;
  letter-spacing:0.12em;
  color:var(--text-tertiary);
  text-transform:uppercase;
  margin-bottom:14px;
  display:flex;
  align-items:center;
  gap:8px;
}

.db-sec-title::before{
  content:'';
  width:4px;
  height:4px;
  border-radius:50%;
  background:currentColor;
  opacity:0.5;
}

.db-row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:10px 0;
  border-bottom:1px dashed var(--border);
  font-family:var(--font-mono);
  font-size:11px;
  transition:background var(--transition-fast);
}

.db-row:hover{
  background:var(--bg-subtle);
  margin:0 -12px;
  padding:10px 12px;
  border-radius:6px;
}

.db-row:last-child{border-bottom:none}

.db-lbl{
  color:var(--text-secondary);
  font-weight:500;
  display:flex;
  align-items:center;
  gap:6px;
}

.db-val{
  font-weight:700;
  color:var(--text-primary);
  font-family:var(--font-mono);
  letter-spacing:-0.01em;
}

.db-val.up{color:var(--long)}
.db-val.dn{color:var(--short)}
.db-val.am{color:var(--warning)}

/* Progress Bars */
.db-bar-wrap{margin-top:12px}

.db-bar-lbl{
  display:flex;
  justify-content:space-between;
  font-family:var(--font-mono);
  font-size:10px;
  color:var(--text-tertiary);
  margin-bottom:8px;
  font-weight:600;
}

.db-bar-track{
  height:6px;
  background:var(--bg-subtle);
  border-radius:3px;
  overflow:hidden;
  position:relative;
}

.db-bar-track::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.2) 50%, transparent 100%);
  animation:shimmer 2s infinite;
}

@keyframes shimmer{
  0%{transform:translateX(-100%)}
  100%{transform:translateX(100%)}
}

.db-bar-fill{
  height:100%;
  border-radius:3px;
  transition:width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  position:relative;
}

.db-bar-fill.pass{background:var(--long)}
.db-bar-fill.warn{background:var(--warning)}
.db-bar-fill.fail{background:var(--short)}

/* Live Log */
.db-log{
  background:var(--bg-subtle);
  border-radius:var(--radius-md);
  padding:14px;
  font-family:var(--font-mono);
  font-size:10px;
  height:200px;
  overflow-y:auto;
  display:flex;
  flex-direction:column;
  gap:8px;
  border:1px solid var(--border);
}

.db-log-row{
  display:flex;
  gap:10px;
  align-items:flex-start;
  padding:6px 8px;
  border-radius:6px;
  transition:background var(--transition-fast);
  animation:slideIn 0.3s ease;
}

@keyframes slideIn{
  from{opacity:0;transform:translateX(-10px)}
  to{opacity:1;transform:translateX(0)}
}

.db-log-row:hover{background:rgba(255,255,255,0.5)}

.db-log-ts{
  color:var(--text-tertiary);
  flex-shrink:0;
  font-size:9px;
  font-weight:600;
}

.db-log-tag{
  flex-shrink:0;
  padding:2px 6px;
  border-radius:4px;
  font-size:8px;
  font-weight:800;
  text-transform:uppercase;
  letter-spacing:0.05em;
}

.db-log-tag.ok{background:var(--long-light);color:var(--long)}
.db-log-tag.blk{background:var(--short-light);color:var(--short)}
.db-log-tag.inf{background:var(--accent-light);color:var(--accent)}
.db-log-tag.wrn{background:var(--warning-light);color:var(--warning)}

.db-log-msg{
  color:var(--text-secondary);
  flex:1;
  line-height:1.5;
  font-weight:500;
}

/* Gate Grid Mini */
.db-gate-grid{
  display:grid;
  grid-template-columns:repeat(11, 1fr);
  gap:6px;
  margin-top:12px;
}

.db-g{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  font-family:var(--font-mono);
  font-size:9px;
}

.db-g-dot{
  width:8px;
  height:8px;
  border-radius:50%;
  transition:all var(--transition-fast);
}

.db-g-dot.pass{
  background:var(--long);
  box-shadow:0 0 6px var(--long-glow);
}

.db-g-dot.fail{background:var(--short);opacity:0.4}

.db-g-num{
  color:var(--text-tertiary);
  font-weight:700;
  font-size:8px;
}

/* ICT Chart Section */
.ict-bar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  background:var(--bg);
  gap:10px;
}

.tfbtns{
  display:flex;
  gap:4px;
  background:var(--bg-subtle);
  padding:3px;
  border-radius:var(--radius-md);
  border:1px solid var(--border);
}

.tfb{
  font-family:var(--font-mono);
  font-size:10px;
  padding:6px 10px;
  border-radius:6px;
  border:1px solid transparent;
  background:transparent;
  color:var(--text-tertiary);
  font-weight:700;
  cursor:pointer;
  transition:all var(--transition-fast);
  min-width:36px;
}

.tfb:hover{color:var(--text-primary)}
.tfb.active{
  background:var(--bg-elevated);
  color:var(--accent);
  border-color:var(--border-strong);
  box-shadow:var(--shadow-sm);
}

.cst{
  display:flex;
  align-items:center;
  gap:8px;
  font-family:var(--font-mono);
  font-size:10px;
  color:var(--text-tertiary);
  font-weight:600;
  background:var(--bg-subtle);
  padding:6px 10px;
  border-radius:20px;
  border:1px solid var(--border);
}

.cdot{
  width:6px;
  height:6px;
  border-radius:50%;
  background:var(--text-tertiary);
  transition:all var(--transition-fast);
}

.cdot.live{
  background:var(--long);
  box-shadow:0 0 0 2px var(--long-glow);
  animation:pulse 2s infinite;
}

#ict-wrap{
  position:relative;
  width:100%;
  height:420px;
  background:var(--bg);
}

#ict-cv{
  display:block;
  width:100%;
  height:100%;
}

.lgrow{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  padding:12px 16px;
  border-top:1px solid var(--border);
  background:var(--bg);
}

.lgi{
  display:flex;
  align-items:center;
  gap:6px;
  font-family:var(--font-mono);
  font-size:9px;
  color:var(--text-tertiary);
  font-weight:600;
  background:var(--bg-subtle);
  padding:4px 8px;
  border-radius:6px;
  border:1px solid var(--border);
}

.lgd{
  width:12px;
  height:3px;
  border-radius:2px;
}

/* Section Headers */
.sec{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:24px 20px 12px;
}

.sect{
  font-family:var(--font-mono);
  font-size:11px;
  font-weight:800;
  color:var(--text-tertiary);
  text-transform:uppercase;
  letter-spacing:0.12em;
  display:flex;
  align-items:center;
  gap:8px;
}

.sect::before{
  content:'';
  width:8px;
  height:1px;
  background:currentColor;
  opacity:0.5;
}

.secb{
  font-family:var(--font-mono);
  font-size:10px;
  padding:4px 10px;
  border-radius:20px;
  background:var(--bg-subtle);
  border:1px solid var(--border);
  color:var(--text-tertiary);
  font-weight:700;
}

/* Trade Levels - Card Style */
.rc{
  margin:0 20px;
  background:var(--bg-elevated);
  border:1px solid var(--border);
  border-radius:var(--radius-xl);
  overflow:hidden;
  box-shadow:var(--shadow-md);
  position:relative;
}

.rc::before{
  content:'';
  position:absolute;
  top:0;
  left:0;
  right:0;
  height:3px;
  background:linear-gradient(90deg, var(--long), var(--warning), var(--short));
  opacity:0.3;
}

.rw{padding:12px}

.ri{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px;
  border-bottom:1px solid var(--border);
  cursor:pointer;
  transition:all var(--transition-fast);
  border-radius:10px;
  margin-bottom:4px;
  position:relative;
  overflow:hidden;
}

.ri::before{
  content:'';
  position:absolute;
  left:0;
  top:0;
  bottom:0;
  width:3px;
  background:transparent;
  transition:background var(--transition-fast);
}

.ri:hover{
  background:var(--bg-subtle);
  transform:translateX(4px);
  box-shadow:var(--shadow-sm);
}

.ri:active{transform:scale(0.99)}

.ri:hover::before{
  background:var(--accent);
}

.rt{
  font-family:var(--font-mono);
  font-size:11px;
  font-weight:800;
  min-width:50px;
  letter-spacing:0.02em;
}

.rt.tp3,.rt.tp2,.rt.tp1{color:var(--long)}
.rt.entry{color:var(--warning)}
.rt.sl,.rt.inv{color:var(--short)}

.rp{
  font-family:var(--font-mono);
  font-size:15px;
  font-weight:800;
  color:var(--text-primary);
  flex:1;
  text-align:right;
  padding-right:12px;
  letter-spacing:-0.01em;
}

.rpct{
  font-family:var(--font-mono);
  font-size:11px;
  font-weight:700;
  min-width:60px;
  text-align:right;
  opacity:0.8;
}

.rcpy{
  font-size:14px;
  opacity:0;
  color:var(--accent);
  padding:4px;
  transition:all var(--transition-fast);
  border-radius:4px;
  background:var(--accent-light);
}

.ri:hover .rcpy{
  opacity:1;
  transform:scale(1.1);
}

/* Footer Stats */
.rftr{
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  border-top:1px solid var(--border);
  background:var(--bg);
}

.rfi{
  padding:18px 20px;
  display:flex;
  flex-direction:column;
  gap:6px;
  position:relative;
}

.rfi:first-child{border-right:1px solid var(--border)}

.rfl{
  font-family:var(--font-mono);
  font-size:10px;
  color:var(--text-tertiary);
  text-transform:uppercase;
  letter-spacing:0.08em;
  font-weight:700;
}

.rfv{
  font-family:var(--font-mono);
  font-size:20px;
  font-weight:800;
  color:var(--text-primary);
  letter-spacing:-0.02em;
}

.rfv.good{color:var(--long)}

.rrbg{
  height:4px;
  background:var(--bg-subtle);
  border-radius:2px;
  overflow:hidden;
  margin-top:8px;
  position:relative;
}

.rrbg::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(90deg, var(--warning), var(--long));
  opacity:0.3;
}

.rrfill{
  height:100%;
  background:linear-gradient(90deg, var(--warning), var(--long));
  width:0%;
  border-radius:2px;
  transition:width 1s cubic-bezier(0.34, 1.56, 0.64, 1) 0.3s;
  position:relative;
  z-index:1;
}

/* Calculator */
.calc-drawer{
  margin:12px 20px;
  border-radius:var(--radius-xl);
  border:1px solid var(--border);
  background:var(--bg-elevated);
  overflow:hidden;
  box-shadow:var(--shadow-md);
}

.calc-hdr{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:16px 20px;
  cursor:pointer;
  background:var(--bg);
  border-bottom:1px solid transparent;
  transition:all var(--transition-fast);
}

.calc-hdr:hover{
  background:var(--bg-subtle);
  border-bottom-color:var(--border);
}

.calc-hdr:hover .calc-title{color:var(--text-primary)}

.calc-title{
  font-family:var(--font-mono);
  font-size:11px;
  font-weight:800;
  color:var(--text-secondary);
  letter-spacing:0.08em;
  text-transform:uppercase;
  display:flex;
  align-items:center;
  gap:8px;
  transition:color var(--transition-fast);
}

.calc-toggle{
  font-family:var(--font-mono);
  font-size:11px;
  color:var(--accent);
  font-weight:800;
  padding:4px 10px;
  background:var(--accent-light);
  border-radius:20px;
  transition:all var(--transition-fast);
}

.calc-body{
  display:none;
  padding:20px;
  background:var(--bg-elevated);
  animation:slideDown 0.3s ease;
}

@keyframes slideDown{
  from{opacity:0;transform:translateY(-10px)}
  to{opacity:1;transform:translateY(0)}
}

.calc-body.open{display:block}

.calc-row{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:14px;
  margin-bottom:16px;
}

.calc-field{
  display:flex;
  flex-direction:column;
  gap:6px;
}

.calc-label{
  font-family:var(--font-mono);
  font-size:9px;
  color:var(--text-tertiary);
  text-transform:uppercase;
  letter-spacing:0.08em;
  font-weight:700;
}

.calc-input{
  font-family:var(--font-mono);
  font-size:14px;
  font-weight:700;
  padding:10px 14px;
  border-radius:10px;
  border:1px solid var(--border);
  background:var(--bg);
  color:var(--text-primary);
  outline:none;
  width:100%;
  transition:all var(--transition-fast);
}

.calc-input:focus{
  border-color:var(--accent);
  box-shadow:0 0 0 3px var(--accent-light);
  transform:translateY(-1px);
}

.calc-mode{
  display:flex;
  gap:8px;
  margin-bottom:16px;
  background:var(--bg);
  padding:4px;
  border-radius:10px;
  border:1px solid var(--border);
}

.calc-mode-btn{
  flex:1;
  padding:10px;
  border-radius:8px;
  background:transparent;
  font-family:var(--font-mono);
  font-size:10px;
  font-weight:800;
  color:var(--text-tertiary);
  cursor:pointer;
  text-align:center;
  transition:all var(--transition-fast);
  border:none;
  text-transform:uppercase;
  letter-spacing:0.05em;
}

.calc-mode-btn.active{
  background:var(--bg-elevated);
  color:var(--text-primary);
  box-shadow:var(--shadow-sm);
  border:1px solid var(--border-strong);
}

.calc-results{
  background:var(--bg);
  border-radius:12px;
  padding:16px;
  margin-top:8px;
  border:1px solid var(--border);
}

.calc-result-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px 0;
  border-bottom:1px dashed var(--border);
}

.calc-result-row:last-child{border-bottom:none}

.calc-result-label{
  font-family:var(--font-mono);
  font-size:10px;
  color:var(--text-secondary);
  font-weight:600;
}

.calc-result-val{
  font-family:var(--font-mono);
  font-size:13px;
  font-weight:800;
  color:var(--text-primary);
  letter-spacing:-0.01em;
}

.calc-result-val.ok{color:var(--long)}
.calc-result-val.warn{color:var(--warning)}
.calc-result-val.bad{color:var(--short)}

/* Gates Grid */
.gc{
  margin:0 20px;
  background:var(--bg-elevated);
  border:1px solid var(--border);
  border-radius:var(--radius-xl);
  padding:16px;
  box-shadow:var(--shadow-md);
}

.gg{
  display:grid;
  grid-template-columns:repeat(5, 1fr);
  gap:10px;
}

.gce{
  aspect-ratio:1;
  min-width:44px;
  min-height:44px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:var(--font-mono);
  font-size:13px;
  font-weight:800;
  position:relative;
  cursor:pointer;
  transition:all var(--transition-spring);
  border:2px solid transparent;
}

.gce:hover{transform:translateY(-3px) scale(1.05)}

.gce:active{transform:scale(0.95)}

.gce.pass{
  background:var(--long-light);
  color:var(--long);
  border-color:var(--long);
  box-shadow:0 4px 12px var(--long-glow);
}

.gce.fail{
  background:var(--bg-subtle);
  color:var(--text-tertiary);
  border-color:var(--border);
  opacity:0.6;
}

.gn{
  position:absolute;
  top:4px;
  left:6px;
  font-size:8px;
  opacity:0.6;
  font-weight:700;
}

/* HMM Panel */
.hc{
  margin:0 20px;
  background:var(--bg-elevated);
  border:1px solid var(--border);
  border-radius:var(--radius-xl);
  padding:18px 20px;
  box-shadow:var(--shadow-md);
}

.ht{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:14px;
}

.hs{
  font-family:var(--font-mono);
  font-size:18px;
  font-weight:800;
  letter-spacing:-0.02em;
}

.hs.bull,.hs.trending{color:var(--long)}
.hs.bear,.hs.volatile{color:var(--short)}
.hs.range,.hs.choppy{color:var(--warning)}

.hbw{
  flex:1;
  margin-left:20px;
  display:flex;
  align-items:center;
  gap:12px;
}

.hbb{
  flex:1;
  height:6px;
  background:var(--bg-subtle);
  border-radius:3px;
  overflow:hidden;
  position:relative;
}

.hbf{
  height:100%;
  border-radius:3px;
  width:0%;
  transition:width 1s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s;
  position:relative;
}

.hbf::after{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  animation:shimmer 2s infinite;
}

.hbf.bull,.hbf.trending{background:linear-gradient(90deg, #047857, var(--long))}
.hbf.bear,.hbf.volatile{background:linear-gradient(90deg, #b91c1c, var(--short))}
.hbf.range,.hbf.choppy{background:linear-gradient(90deg, #d97706, var(--warning))}

.hpct{
  font-family:var(--font-mono);
  font-size:12px;
  font-weight:800;
  color:var(--text-tertiary);
  min-width:40px;
  text-align:right;
}

.hp{
  display:flex;
  gap:8px;
  align-items:center;
  flex-wrap:wrap;
}

.pn{
  font-family:var(--font-mono);
  font-size:9px;
  font-weight:800;
  padding:5px 10px;
  border-radius:20px;
  text-transform:uppercase;
  letter-spacing:0.05em;
  transition:all var(--transition-fast);
}

.pn.BULL,.pn.TRENDING{
  background:var(--long-light);
  color:var(--long);
  border:1px solid rgba(5,150,105,0.2);
}

.pn.BEAR,.pn.VOLATILE{
  background:var(--short-light);
  color:var(--short);
  border:1px solid rgba(220,38,38,0.2);
}

.pn.RANGE,.pn.CHOPPY{
  background:var(--warning-light);
  color:var(--warning);
  border:1px solid rgba(217,119,6,0.2);
}

.pn.curr{
  box-shadow:0 0 0 2px currentColor, 0 2px 8px currentColor;
  transform:scale(1.05);
}

/* Panels */
.mkc{
  margin:0 20px;
  background:var(--bg-elevated);
  border:1px solid var(--border);
  border-radius:var(--radius-xl);
  padding:18px 20px;
  box-shadow:var(--shadow-md);
}

.mk-verdict{
  font-size:13px;
  font-weight:700;
  padding:12px 14px;
  border-radius:10px;
  margin-bottom:14px;
  line-height:1.5;
  font-family:var(--font-sans);
  border:1px solid;
  position:relative;
  overflow:hidden;
}

.mk-verdict::before{
  content:'';
  position:absolute;
  left:0;
  top:0;
  bottom:0;
  width:4px;
}

.mk-confirmed{
  background:var(--long-light);
  color:var(--long);
  border-color:rgba(5,150,105,0.2);
}

.mk-confirmed::before{background:var(--long)}

.mk-vetoed{
  background:var(--short-light);
  color:var(--short);
  border-color:rgba(220,38,38,0.2);
}

.mk-vetoed::before{background:var(--short)}

.mk-caution{
  background:var(--warning-light);
  color:var(--warning);
  border-color:rgba(217,119,6,0.2);
}

.mk-caution::before{background:var(--warning)}

.mk-neutral{
  background:var(--bg-subtle);
  color:var(--text-secondary);
  border-color:var(--border);
}

.mk-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:8px 0;
  border-bottom:1px dashed var(--border);
}

.mk-row:last-child{border-bottom:none}

.mk-lbl{font-size:11px;color:var(--text-secondary);font-weight:600}

.mk-val{
  font-family:var(--font-mono);
  font-size:12px;
  font-weight:800;
  color:var(--text-primary);
  letter-spacing:-0.01em;
}

.mk-mod{color:var(--warning);font-weight:800}

/* Gaps */
.gapc{
  margin:0 20px;
  background:var(--bg-elevated);
  border:1px solid var(--border);
  border-radius:var(--radius-xl);
  overflow:hidden;
  box-shadow:var(--shadow-md);
}

.gapr{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  transition:background var(--transition-fast);
}

.gapr:hover{background:var(--bg-subtle)}

.gapr:last-child{border-bottom:none}

.gapsrc{
  font-family:var(--font-mono);
  font-size:11px;
  color:var(--text-primary);
  flex:1;
  font-weight:700;
}

.gapnt{
  font-family:var(--font-sans);
  font-size:10px;
  color:var(--text-secondary);
  flex:2;
  padding:0 12px;
  line-height:1.4;
  font-weight:500;
}

.gapq{
  font-family:var(--font-mono);
  font-size:10px;
  font-weight:800;
  padding:4px 10px;
  border-radius:20px;
  min-width:70px;
  text-align:center;
  text-transform:uppercase;
  letter-spacing:0.03em;
}

.gapq.FULL{
  background:var(--long-light);
  color:var(--long);
  border:1px solid rgba(5,150,105,0.2);
}

.gapq.PARTIAL{
  background:var(--warning-light);
  color:var(--warning);
  border:1px solid rgba(217,119,6,0.2);
}

.gapq.PROXY{
  background:var(--accent-light);
  color:var(--accent);
  border:1px solid rgba(14,165,233,0.2);
}

.gapq.MISSING{
  background:var(--short-light);
  color:var(--short);
  border:1px solid rgba(220,38,38,0.2);
}

/* Pipeline */
.pc{
  margin:0 20px;
  background:var(--bg-elevated);
  border:1px solid var(--border);
  border-radius:var(--radius-xl);
  overflow:hidden;
  box-shadow:var(--shadow-md);
}

.pr{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 18px;
  border-bottom:1px solid var(--border);
  cursor:pointer;
  transition:all var(--transition-fast);
  position:relative;
}

.pr:hover{
  background:var(--bg-subtle);
  padding-left:22px;
}

.pr:last-child{border-bottom:none}

.pr.expanded{background:var(--bg-subtle)}

.prl{display:flex;align-items:center;gap:12px}

.pst{
  font-family:var(--font-mono);
  font-size:9px;
  color:var(--text-tertiary);
  background:var(--bg);
  padding:3px 8px;
  border-radius:4px;
  border:1px solid var(--border);
  min-width:50px;
  text-align:center;
  font-weight:800;
  letter-spacing:0.03em;
}

.plbl{
  font-family:var(--font-mono);
  font-size:12px;
  color:var(--text-primary);
  font-weight:700;
}

.prr{display:flex;align-items:center;gap:10px}

.pb{
  font-family:var(--font-mono);
  font-size:10px;
  font-weight:800;
  padding:4px 10px;
  border-radius:20px;
  text-transform:uppercase;
  letter-spacing:0.03em;
}

.pb.pass{
  background:var(--long-light);
  color:var(--long);
  border:1px solid rgba(5,150,105,0.2);
}

.pb.warn{
  background:var(--warning-light);
  color:var(--warning);
  border:1px solid rgba(217,119,6,0.2);
}

.pb.fail{
  background:var(--short-light);
  color:var(--short);
  border:1px solid rgba(220,38,38,0.2);
}

.pb.info{
  background:var(--bg-subtle);
  color:var(--text-secondary);
  border:1px solid var(--border);
}

.pch{
  color:var(--text-tertiary);
  font-size:12px;
  transition:transform 0.3s;
  font-weight:700;
  opacity:0.6;
}

.pr.expanded .pch{transform:rotate(90deg);opacity:1}

.pd{
  background:var(--bg);
  border-bottom:1px solid var(--border);
  padding:14px 18px;
  display:none;
  box-shadow:inset 0 2px 4px rgba(0,0,0,0.02);
  font-family:var(--font-mono);
  font-size:11px;
  color:var(--text-secondary);
  line-height:1.7;
  white-space:pre-wrap;
  overflow-wrap:break-word;
  word-break:break-word;
}

.pd.open{display:block;animation:fadeIn 0.3s ease}

/* MTF */
.mtfc{
  margin:0 20px;
  background:var(--bg-elevated);
  border:1px solid var(--border);
  border-radius:var(--radius-xl);
  padding:14px 18px;
  box-shadow:var(--shadow-md);
}

.mtfr{
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap;
}

.mtft{
  font-family:var(--font-mono);
  font-size:11px;
  font-weight:800;
  padding:6px 12px;
  border-radius:8px;
  background:var(--bg-subtle);
  border:1px solid var(--border);
  transition:all var(--transition-fast);
}

.mtft:hover{transform:translateY(-2px)}

.mtft.b{
  border-color:rgba(14,165,233,0.4);
  color:var(--accent);
  background:var(--accent-light);
}

.mtft.r{
  border-color:rgba(217,119,6,0.4);
  color:var(--warning);
  background:var(--warning-light);
}

.mtft.e{
  border-color:rgba(5,150,105,0.4);
  color:var(--long);
  background:var(--long-light);
}

.mtfa{
  color:var(--text-tertiary);
  font-size:12px;
  font-weight:800;
  opacity:0.5;
}

/* Toast */
.toast{
  position:fixed;
  bottom:100px;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  background:var(--text-primary);
  color:var(--bg);
  font-family:var(--font-sans);
  font-size:13px;
  font-weight:600;
  padding:12px 24px;
  border-radius:30px;
  pointer-events:none;
  opacity:0;
  transition:all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  white-space:normal;
  max-width:calc(100vw - 40px);
  text-align:center;
  word-break:break-all;
  z-index:999;
  box-shadow:var(--shadow-lg);
  border:1px solid var(--border-strong);
}

.toast.show{
  opacity:1;
  transform:translateX(-50%) translateY(0);
}

/* Bottom Bar */
.bbar{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:var(--bg-surface);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border-top:1px solid var(--border);
  padding:16px 20px;
  display:flex;
  gap:12px;
  z-index:200;
  box-shadow:0 -4px 20px rgba(0,0,0,0.05);
  max-width:480px;
  margin:0 auto;
  right:max(0px,calc((100vw - 480px)/2));
  left:max(0px,calc((100vw - 480px)/2));
  padding-bottom:calc(16px + env(safe-area-inset-bottom, 0px));
}

.bc{
  flex:1;
  padding:14px;
  border-radius:12px;
  background:var(--bg-subtle);
  border:1px solid var(--border);
  color:var(--text-secondary);
  font-family:var(--font-sans);
  font-size:13px;
  font-weight:700;
  cursor:pointer;
  transition:all var(--transition-fast);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  position:relative;
  overflow:hidden;
}

.bc::before{
  content:'';
  position:absolute;
  inset:0;
  background:linear-gradient(180deg, rgba(255,255,255,0.1) 0%, transparent 100%);
  opacity:0;
  transition:opacity var(--transition-fast);
}

.bc:hover{
  transform:translateY(-2px);
  box-shadow:var(--shadow-md);
  border-color:var(--border-strong);
}

.bc:hover::before{opacity:1}

.bc:active{transform:scale(0.96)}

.bc.primary{
  background:var(--accent);
  color:#fff;
  border-color:var(--accent);
  box-shadow:0 4px 12px rgba(14,165,233,0.3), var(--shadow-sm);
}

.bc.primary:hover{
  background:#0284c7;
  box-shadow:0 6px 16px rgba(14,165,233,0.4);
}

.bc.primary:active{transform:scale(0.95)}

/* Loader */
#loader{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:80vh;
  gap:20px;
}

.ring{
  width:48px;
  height:48px;
  border:3px solid var(--bg-subtle);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin 0.8s linear infinite;
  position:relative;
}

.ring::after{
  content:'';
  position:absolute;
  inset:-6px;
  border-radius:50%;
  border:2px solid transparent;
  border-top-color:var(--accent-light);
  animation:spin 1.5s linear infinite reverse;
  opacity:0.5;
}

@keyframes spin{to{transform:rotate(360deg)}}

.lt{
  font-family:var(--font-mono);
  font-size:12px;
  color:var(--text-tertiary);
  letter-spacing:0.15em;
  font-weight:700;
  text-transform:uppercase;
}

#empty{
  display:none;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  min-height:70vh;
  gap:16px;
  padding:40px;
  text-align:center;
}

#empty.show{display:flex;animation:fadeIn 0.5s ease}

/* Animations */
.fi{animation:fadeInUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) both}

@keyframes fadeInUp{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}

.fi1{animation-delay:0.05s}
.fi2{animation-delay:0.10s}
.fi3{animation-delay:0.15s}
.fi4{animation-delay:0.20s}
.fi5{animation-delay:0.25s}
.fi6{animation-delay:0.30s}

/* Devil's Advocate */
.g11-panel{
  margin:0 20px 12px;
  background:var(--short-light);
  border:1px solid rgba(220,38,38,0.2);
  border-radius:var(--radius-lg);
  padding:14px 18px;
  box-shadow:var(--shadow-sm);
  position:relative;
  overflow:hidden;
}

.g11-panel::before{
  content:'';
  position:absolute;
  left:0;
  top:0;
  bottom:0;
  width:3px;
  background:var(--short);
}

.g11-panel.pass{
  background:var(--long-light);
  border-color:rgba(5,150,105,0.2);
}

.g11-panel.pass::before{background:var(--long)}

.g11-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:6px;
}

.g11-lbl{
  font-family:var(--font-mono);
  font-size:10px;
  font-weight:800;
  color:var(--text-secondary);
  text-transform:uppercase;
  letter-spacing:0.08em;
}

.g11-val{
  font-family:var(--font-mono);
  font-size:14px;
  font-weight:800;
}

.g11-val.pass{color:var(--long)}
.g11-val.fail{color:var(--short)}

.g11-note{
  font-family:var(--font-sans);
  font-size:11px;
  color:var(--text-secondary);
  margin-top:8px;
  line-height:1.5;
  font-weight:500;
}

/* Fingerprint Memory */
.fp-row{

  align-items:center;
  gap:12px;
  padding:12px 16px;

}

}

.fp-lbl{

}

.fp-val{

}

.fp-val.mid{color:var(--warning)}

.fp-n{

/* Crowd Social Proof */
.crowd-row{
  margin:0 20px 8px;
  padding:12px 16px;
  background:var(--bg-subtle);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);

  align-items:center;

}

.crowd-lbl{
  font-family:var(--font-mono);

.crowd-bar{

}

.crowd-fill{

.crowd-pct{

/* Trade Journal */
.jrnl-drawer{
  margin:12px 20px;
  border-radius:var(--radius-xl);
  border:1px solid var(--border);
  background:var(--bg-elevated);

}

.jrnl-hdr{

  align-items:center;

}

.jrnl-hdr:hover{

}

.jrnl-title{

}

}

  font-size:11px;
  font-weight:800;

}

}

}

}

.jrnl-outcomes{

.jrnl-outcomes.show{display:flex}

.job{

  border-radius:10px;
  border:1px solid var(--border);

  font-family:var(--font-mono);
  font-size:12px;
  font-weight:700;

  text-align:center;
  transition:all var(--transition-fast);

}

.job:hover{
  transform:translateY(-2px);

}

.job:active{transform:scale(0.98)}

.jrnl-sent{

}

.ll-val.low{color:var(--warning)}
.ll-val.medium{color:var(--accent)}
.ll-val.high{color:var(--long)}

.ll-note{
  font-family:var(--font-sans);
  font-size:11px;
  color:var(--text-secondary);
  margin-top:8px;
  line-height:1.5;
  font-weight:500;
}

.ll-bar{
  flex:1;
  height:4px;
  background:var(--bg-subtle);
  border-radius:2px;
  overflow:hidden;
  margin:0 12px;
  border:1px solid var(--border);
}

.ll-fill{
  height:100%;
  background:linear-gradient(90deg, var(--warning), var(--long));
  border-radius:2px;
  transition:width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s;
  box-shadow:0 0 8px var(--long-glow);
}

/* Flash Warning */
.flash-warn{
  margin:8px 20px;
  padding:12px 16px;
  background:var(--warning-light);
  border:1px solid rgba(217,119,6,0.4);
  border-radius:var(--radius-lg);
  font-family:var(--font-sans);
  font-size:12px;
  color:var(--warning);
  font-weight:800;
  display:flex;
  align-items:center;
  gap:10px;
  box-shadow:var(--shadow-sm);
  animation:pulse-border 2s infinite;
}

@keyframes pulse-border{
  0%,100%{box-shadow:0 0 0 0 rgba(217,119,6,0.2)}
  50%{box-shadow:0 0 0 4px rgba(217,119,6,0.1)}
}

/* Markov Adj Prob */
.map-badge{
  margin:0 20px 10px;
  padding:12px 18px;
  background:var(--bg-elevated);
  border:1px solid var(--border);
  border-radius:var(--radius-lg);
  display:flex;
  align-items:center;
  justify-content:space-between;
  box-shadow:var(--shadow-sm);
}

.map-lbl{
  font-family:var(--font-mono);
  font-size:10px;
  color:var(--text-secondary);
  text-transform:uppercase;
  letter-spacing:0.08em;
  font-weight:800;
}

.map-val{
  font-family:var(--font-mono);
  font-size:16px;
  font-weight:800;
  letter-spacing:-0.02em;
}

.map-val.high{color:var(--long);text-shadow:0 0 20px var(--long-glow)}
.map-val.moderate{color:var(--warning)}
.map-val.low{color:var(--short)}

/* Liquidation Heatmap */
.lhp{
  padding:16px 18px;
  display:flex;
  flex-direction:column;
  gap:10px;
  background:var(--bg-elevated);
  margin:0 20px;
  border:1px solid var(--border);
  border-radius:var(--radius-xl);
  box-shadow:var(--shadow-md);
}

.lh-badge{
  display:inline-flex;
  align-items:center;
  gap:8px;
  font-size:10px;
  font-family:var(--font-mono);
  font-weight:800;
  letter-spacing:0.05em;
  padding:5px 12px;
  border-radius:20px;
  background:var(--bg-subtle);
  color:var(--text-secondary);
  margin-bottom:8px;
  align-self:flex-start;
  border:1px solid var(--border);
  text-transform:uppercase;
}

.lh-badge.real{
  background:var(--long-light);
  color:var(--long);
  border-color:var(--long);
  box-shadow:0 0 0 3px var(--long-glow);
}

.lh-row{
  display:flex;
  align-items:center;
  gap:12px;
  padding:8px 0;
  border-bottom:1px dashed var(--border);
  transition:background var(--transition-fast);
}

.lh-row:hover{
  background:var(--bg-subtle);
  margin:0 -12px;
  padding:8px 12px;
  border-radius:8px;
}

.lh-row:last-child{border-bottom:none}

.lh-tag{
  font-size:10px;
  font-weight:800;
  letter-spacing:0.05em;
  min-width:80px;
  padding:5px 10px;
  border-radius:20px;
  text-align:center;
  font-family:var(--font-mono);
  text-transform:uppercase;
}

.lh-tag.ls{
  background:var(--short-light);
  color:var(--short);
  border:1px solid rgba(220,38,38,0.2);
}

.lh-tag.ll{
  background:var(--long-light);
  color:var(--long);
  border:1px solid rgba(5,150,105,0.2);
}

.lh-price{
  font-size:15px;
  font-weight:800;
  font-family:var(--font-mono);
  color:var(--text-primary);
  cursor:pointer;
  flex:1;
  transition:all var(--transition-fast);
  letter-spacing:-0.01em;
}

.lh-price:hover{
  color:var(--accent);
  transform:translateX(4px);
}

.lh-note{
  font-size:11px;
  font-family:var(--font-sans);
  color:var(--text-tertiary);
  padding:10px 0 4px;
  border-top:1px solid var(--border);
  line-height:1.5;
  margin-top:6px;
  font-weight:500;
}

/* Live Dashboard Specific */
.db-live-pill{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:6px 14px;
  border-radius:20px;
  background:var(--long-light);
  color:var(--long);
  border:1px solid rgba(5,150,105,0.2);
  font-family:var(--font-mono);
  font-size:11px;
  font-weight:800;
  box-shadow:0 0 0 3px var(--long-glow);
  margin-bottom:14px;
}

.db-live-pill .dot{
  width:6px;
  height:6px;
  border-radius:50%;
  background:currentColor;
  animation:pulse 2s infinite;
}

/* Callout Cards */
.db-callout{
  background:var(--bg-subtle);
  border:1px solid var(--border);
  border-radius:12px;
  padding:14px 16px;
  transition:all var(--transition-fast);
}

.db-callout:hover{
  border-color:var(--border-strong);
  transform:translateY(-2px);
  box-shadow:var(--shadow-sm);
}

.db-callout-title{
  font-family:var(--font-mono);
  font-size:10px;
  font-weight:800;
  letter-spacing:0.08em;
  color:var(--text-tertiary);
  text-transform:uppercase;
  margin-bottom:10px;
  display:flex;
  align-items:center;
  gap:6px;
}

.db-callout-body{
  font-family:var(--font-sans);
  font-size:12px;
  line-height:1.7;
  color:var(--text-secondary);
  font-weight:500;
}

.db-callout-body strong{
  color:var(--text-primary);
  font-weight:700;
}

/* Mini Grid */
.db-mini-grid{
  display:grid;
  grid-template-columns:repeat(2, 1fr);
  gap:12px;
  margin-top:14px;
}

/* Key Value */
.db-kv{
  display:flex;
  justify-content:space-between;
  gap:12px;
  padding:6px 0;
  border-top:1px dashed var(--border);
}

.db-kv:first-of-type{border-top:none;padding-top:0}

.db-kv-k{
  font-family:var(--font-mono);
  font-size:10px;
  color:var(--text-tertiary);
  font-weight:600;
}

.db-kv-v{
  font-family:var(--font-mono);
  font-size:12px;
  font-weight:800;
  color:var(--text-primary);
  letter-spacing:-0.01em;
}

.db-kv-v.up{color:var(--long)}
.db-kv-v.dn{color:var(--short)}
.db-kv-v.am{color:var(--warning)}

/* Note Box */
.db-note{
  margin-top:12px;
  font-family:var(--font-sans);
  font-size:11px;
  color:var(--text-secondary);
  line-height:1.7;
  background:var(--bg-subtle);
  padding:12px 14px;
  border-radius:10px;
  border:1px solid var(--border);
  font-weight:500;
}

/* Dark Mode Specific Overrides */
body.dark-mode .hdr{background:rgba(11,15,23,0.8)}
body.dark-mode .bbar{background:rgba(11,15,23,0.85)}
body.dark-mode .toast{background:var(--bg-elevated);color:var(--text-primary);border:1px solid var(--border-strong)}
body.dark-mode .calc-input{background:var(--bg-subtle);color:var(--text-primary)}
body.dark-mode .jb, body.dark-mode .job{background:var(--bg-subtle);color:var(--text-secondary)}
body.dark-mode #ict-wrap{background:#070a0f}
body.dark-mode .db-log{background:#070a0f}
body.dark-mode .mc{background:var(--bg-subtle)}
body.dark-mode .ring{border-color:var(--bg-subtle);border-top-color:var(--accent)}
body.dark-mode .ring::after{border-top-color:rgba(14,165,233,0.3)}

/* Responsive Optimizations */
@media (max-width: 380px){
  .hm{grid-template-columns:repeat(2, 1fr)}
  .gg{grid-template-columns:repeat(4, 1fr)}
  .db-mini-grid{grid-template-columns:1fr}
  .hdr-px{font-size:16px}
  .hsym{font-size:18px}
  .bc{font-size:12px;padding:12px}
}

/* Reduced Motion */
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{
    animation-duration:0.01ms !important;
    animation-iteration-count:1 !important;
    transition-duration:0.01ms !important;
  }
}

/* Selection Color */
::selection{
  background:var(--accent);
  color:#fff;
}
</style>
