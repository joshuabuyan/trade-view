<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#080c14">
<title>MOP·ICT·QUANT — Live Signal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Syne:wght@600;700;800&display=swap" rel="stylesheet">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://s3.tradingview.com/tv.js"></script>
<style>
:root{
  --bg:#080c14;--bg2:#0c1220;--bg3:#111826;--bg4:#18222e;
  --border:#1e2e40;--border2:#263848;
  --long:#00d876;--long2:#004d28;--short:#f03050;--short2:#4d0018;
  --amber:#ffb300;--blue:#3d9bff;--cyan:#00d8ff;
  --text:#c0d4e8;--text2:#6888a0;--text3:#3a5060;
  --mono:'JetBrains Mono',monospace;--sans:'Syne',sans-serif;
  --r:8px;--r2:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:13px}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
#app{max-width:480px;margin:0 auto;padding-bottom:76px}
.hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px 8px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200;background:rgba(8,12,20,.96);backdrop-filter:blur(16px)}
.hdr-left{display:flex;align-items:center;gap:7px}
.hdr-logo{font-family:var(--mono);font-size:9px;font-weight:700;color:var(--text2);letter-spacing:.1em}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--long);animation:lp 2s ease-in-out infinite}
.ldot.off{background:var(--text3);animation:none}
@keyframes lp{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(0,216,118,.6)}50%{opacity:.7;box-shadow:0 0 0 4px rgba(0,216,118,0)}}
.hdr-px{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--text)}
.hdr-chg{font-family:var(--mono);font-size:8px;color:var(--text2)}
.hdr-ver{font-family:var(--mono);font-size:8px;color:var(--text3);background:var(--bg3);padding:2px 5px;border-radius:3px;border:1px solid var(--border)}
.hero{margin:10px 10px 0;border-radius:var(--r2);border:1px solid var(--border);overflow:hidden;position:relative;background:var(--bg2)}
.hero-glow{position:absolute;inset:0;pointer-events:none;border-radius:var(--r2);opacity:.08}
.hero.long .hero-glow{background:radial-gradient(ellipse at 20% 50%,var(--long) 0%,transparent 65%)}
.hero.short .hero-glow{background:radial-gradient(ellipse at 20% 50%,var(--short) 0%,transparent 65%)}
.hero-top{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 8px}
.dchip{font-family:var(--mono);font-size:10px;font-weight:700;padding:4px 10px;border-radius:5px;letter-spacing:.1em}
.long .dchip{background:var(--long2);color:var(--long);border:1px solid var(--long)}
.short .dchip{background:var(--short2);color:var(--short);border:1px solid var(--short)}
.hsym{font-family:var(--mono);font-size:17px;font-weight:700;color:#e8f4ff;margin-left:8px}
.hm{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;padding:0 10px 12px}
.mc{background:var(--bg3);border-radius:6px;padding:7px 6px;text-align:center}
.ml{font-family:var(--mono);font-size:7px;color:var(--text2);text-transform:uppercase;letter-spacing:.07em;display:block}
.mv{font-family:var(--mono);font-size:13px;font-weight:700;display:block;margin-top:2px}
.mv.g{color:var(--long)}.mv.r{color:var(--short)}.mv.a{color:var(--amber)}
.state{margin:6px 10px 0;padding:8px 12px;border-radius:var(--r);display:flex;align-items:center;justify-content:space-between;border:1px solid}
.state.active{background:rgba(0,216,118,.08);border-color:rgba(0,216,118,.3)}
.state.blocked{background:rgba(240,48,80,.08);border-color:rgba(240,48,80,.28)}
.state.deferred{background:rgba(255,179,0,.08);border-color:rgba(255,179,0,.28)}
.sdot{width:6px;height:6px;border-radius:50%;margin-right:6px;display:inline-block}
.active .sdot{background:var(--long);animation:lp 2s infinite}
.blocked .sdot{background:var(--short)}.deferred .sdot{background:var(--amber)}
.slbl{font-family:var(--mono);font-size:10px;font-weight:700}
.active .slbl{color:var(--long)}.blocked .slbl{color:var(--short)}.deferred .slbl{color:var(--amber)}
.sev{font-family:var(--mono);font-size:8px;color:var(--text2)}
.tabs{display:flex;border-bottom:1px solid var(--border);margin:10px 10px 0;border-radius:var(--r) var(--r) 0 0;overflow:hidden;background:var(--bg2)}
.tab{flex:1;padding:10px 4px;text-align:center;cursor:pointer;font-family:var(--mono);font-size:9px;font-weight:600;letter-spacing:.06em;color:var(--text2);border:none;background:none;outline:none;transition:all .2s;border-bottom:2px solid transparent}
.tab.active{color:var(--cyan);border-bottom-color:var(--cyan);background:var(--bg3)}
.tab:active{transform:scale(.97)}
.cpanel{margin:0 10px;background:var(--bg2);border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r2) var(--r2);overflow:hidden;display:none}
.cpanel.vis{display:block}
#tv-panel{height:380px}
#tv-container{width:100%;height:100%}
.ict-bar{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-bottom:1px solid var(--border);background:var(--bg3)}
.tfbtns{display:flex;gap:3px}
.tfb{font-family:var(--mono);font-size:8px;padding:3px 7px;border-radius:4px;border:1px solid var(--border2);background:var(--bg4);color:var(--text2);cursor:pointer;transition:all .15s}
.tfb.active,.tfb:active{background:var(--border2);color:var(--cyan);border-color:var(--cyan)}
.cst{display:flex;align-items:center;gap:4px;font-family:var(--mono);font-size:8px;color:var(--text2)}
.cdot{width:5px;height:5px;border-radius:50%;background:var(--text3)}
.cdot.live{background:var(--long);animation:lp 2s infinite}
#ict-wrap{position:relative;width:100%;height:300px;background:#04080f}
#ict-cv{display:block;width:100%;height:100%}
.lgrow{display:flex;flex-wrap:wrap;gap:4px;padding:7px 10px;border-top:1px solid var(--border);background:var(--bg3)}
.lgi{display:flex;align-items:center;gap:3px;font-family:var(--mono);font-size:7px;color:var(--text2)}
.lgd{width:8px;height:3px;border-radius:1px;flex-shrink:0}
.sec{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 7px}
.sect{font-family:var(--mono);font-size:8px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.13em}
.secb{font-family:var(--mono);font-size:8px;padding:2px 6px;border-radius:4px;background:var(--bg3);border:1px solid var(--border);color:var(--text2)}
.rc{margin:0 10px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.rw{padding:6px 10px}
.ri{display:flex;align-items:center;justify-content:space-between;padding:5px 6px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;border-radius:5px;margin-bottom:1px}
.ri:last-child{border-bottom:none}.ri:hover{background:var(--bg3)}.ri:active{background:var(--bg4);transform:scale(.99)}
.rt{font-family:var(--mono);font-size:8px;font-weight:700;min-width:36px}
.rt.tp3,.rt.tp2,.rt.tp1{color:var(--long)}.rt.entry{color:var(--amber)}.rt.sl,.rt.inv{color:var(--short)}
.rp{font-family:var(--mono);font-size:13px;font-weight:600;color:#e8f4ff;flex:1;text-align:right;padding-right:7px}
.rpct{font-family:var(--mono);font-size:8px;min-width:52px;text-align:right}
.rcpy{font-size:9px;opacity:0;color:var(--text3);padding:2px 4px;transition:opacity .2s}
.ri:hover .rcpy{opacity:1}
.rftr{display:grid;grid-template-columns:repeat(2,1fr);border-top:1px solid var(--border)}
.rfi{padding:10px 14px;display:flex;flex-direction:column;gap:2px}
.rfi:first-child{border-right:1px solid var(--border)}
.rfl{font-family:var(--mono);font-size:7px;color:var(--text2);text-transform:uppercase;letter-spacing:.08em}
.rfv{font-family:var(--mono);font-size:16px;font-weight:700;color:#e8f4ff}
.rfv.good{color:var(--long)}
.rrbg{height:3px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-top:4px}
.rrfill{height:100%;background:linear-gradient(90deg,var(--amber),var(--long));width:0%;border-radius:2px;transition:width 1s cubic-bezier(.34,1.56,.64,1) .3s}
.gc{margin:0 10px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:10px}
.gg{display:grid;grid-template-columns:repeat(5,1fr);gap:5px}
.gce{aspect-ratio:1;border-radius:5px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:10px;font-weight:700;position:relative;cursor:pointer;transition:transform .15s}
.gce:active{transform:scale(.88)}
.gce.pass{background:rgba(0,216,118,.1);border:1px solid rgba(0,216,118,.28);color:var(--long)}
.gce.fail{background:rgba(240,48,80,.08);border:1px solid rgba(240,48,80,.18);color:var(--short)}
.gn{position:absolute;top:2px;left:4px;font-size:6px;opacity:.45;font-weight:400}
.hc{margin:0 10px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:10px 12px}
.ht{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.hs{font-family:var(--mono);font-size:15px;font-weight:700}
.hs.bull,.hs.trending{color:var(--long)}.hs.bear,.hs.volatile{color:var(--short)}.hs.range,.hs.choppy{color:var(--amber)}
.hbw{flex:1;margin-left:12px;display:flex;align-items:center;gap:6px}
.hbb{flex:1;height:4px;background:var(--bg3);border-radius:2px;overflow:hidden}
.hbf{height:100%;border-radius:2px;width:0%;transition:width 1s cubic-bezier(.34,1.56,.64,1) .5s}
.hbf.bull,.hbf.trending{background:linear-gradient(90deg,#008040,var(--long))}
.hbf.bear,.hbf.volatile{background:linear-gradient(90deg,#900,var(--short))}
.hbf.range,.hbf.choppy{background:linear-gradient(90deg,#804000,var(--amber))}
.hpct{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--text2)}
.hp{display:flex;gap:3px;align-items:center;flex-wrap:wrap}
.pn{font-family:var(--mono);font-size:7px;font-weight:700;padding:2px 4px;border-radius:3px}
.pn.BULL,.pn.TRENDING{background:rgba(0,216,118,.12);color:var(--long);border:1px solid rgba(0,216,118,.2)}
.pn.BEAR,.pn.VOLATILE{background:rgba(240,48,80,.1);color:var(--short);border:1px solid rgba(240,48,80,.2)}
.pn.RANGE,.pn.CHOPPY{background:rgba(255,179,0,.1);color:var(--amber);border:1px solid rgba(255,179,0,.2)}
.pn.curr{box-shadow:0 0 0 1px currentColor}
.pa{color:var(--text3);font-size:8px}
.gapc{margin:0 10px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.gapr{display:flex;align-items:center;justify-content:space-between;padding:7px 12px;border-bottom:1px solid var(--border)}
.gapr:last-child{border-bottom:none}
.gapsrc{font-family:var(--mono);font-size:9px;color:var(--text);flex:1}
.gapnt{font-family:var(--mono);font-size:7px;color:var(--text2);flex:2;padding:0 6px}
.gapq{font-family:var(--mono);font-size:8px;font-weight:700;padding:2px 6px;border-radius:4px;min-width:50px;text-align:center}
.gapq.FULL{background:rgba(0,216,118,.1);color:var(--long);border:1px solid rgba(0,216,118,.2)}
.gapq.PARTIAL{background:rgba(255,179,0,.1);color:var(--amber);border:1px solid rgba(255,179,0,.2)}
.gapq.PROXY{background:rgba(61,155,255,.1);color:var(--blue);border:1px solid rgba(61,155,255,.2)}
.gapq.MISSING{background:rgba(240,48,80,.1);color:var(--short);border:1px solid rgba(240,48,80,.2)}
.pc{margin:0 10px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);overflow:hidden}
.pr{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s}
.pr:last-child{border-bottom:none}.pr:hover{background:var(--bg3)}.pr:active{background:var(--bg4)}
.prl{display:flex;align-items:center;gap:7px}
.pst{font-family:var(--mono);font-size:7px;color:var(--text2);background:var(--bg3);padding:2px 5px;border-radius:3px;border:1px solid var(--border);min-width:42px;text-align:center}
.plbl{font-family:var(--mono);font-size:10px;color:var(--text)}
.prr{display:flex;align-items:center;gap:5px}
.pb{font-family:var(--mono);font-size:8px;font-weight:700;padding:2px 7px;border-radius:4px}
.pb.pass{background:rgba(0,216,118,.1);color:var(--long);border:1px solid rgba(0,216,118,.22)}
.pb.warn{background:rgba(255,179,0,.1);color:var(--amber);border:1px solid rgba(255,179,0,.22)}
.pb.fail{background:rgba(240,48,80,.1);color:var(--short);border:1px solid rgba(240,48,80,.22)}
.pb.info{background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.pch{color:var(--text3);font-size:10px;transition:transform .2s}
.pr.expanded .pch{transform:rotate(90deg)}
.pd{background:var(--bg);border-bottom:1px solid var(--border);padding:8px 12px;display:none}
.pd.open{display:block}
.pdl{font-family:var(--mono);font-size:9px;color:var(--text2);line-height:1.6;white-space:pre-wrap}
.mtfc{margin:0 10px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:9px 12px}
.mtfr{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.mtft{font-family:var(--mono);font-size:10px;font-weight:700;padding:4px 9px;border-radius:5px;background:var(--bg3);border:1px solid var(--border)}
.mtft.b{border-color:rgba(61,155,255,.4);color:var(--blue)}
.mtft.r{border-color:rgba(255,179,0,.4);color:var(--amber)}
.mtft.e{border-color:rgba(0,216,118,.4);color:var(--long)}
.mtfa{color:var(--text3);font-size:10px}
.mtftyp{margin-left:auto;font-family:var(--mono);font-size:8px;color:var(--text3);background:var(--bg3);padding:2px 6px;border-radius:4px;border:1px solid var(--border)}
.toast{position:fixed;bottom:86px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--bg4);border:1px solid var(--border2);color:var(--long);font-family:var(--mono);font-size:10px;padding:6px 14px;border-radius:20px;pointer-events:none;opacity:0;transition:opacity .2s,transform .2s;white-space:nowrap;z-index:999}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.bbar{position:fixed;bottom:0;left:0;right:0;background:rgba(8,12,20,.97);border-top:1px solid var(--border);padding:9px 12px 14px;display:flex;gap:7px;backdrop-filter:blur(16px);z-index:200;box-shadow:0 -4px 20px rgba(0,0,0,.5);max-width:480px;margin:0 auto;right:max(0px,calc((100vw - 480px)/2));left:max(0px,calc((100vw - 480px)/2))}
.bc{flex:1;padding:10px;border-radius:var(--r);background:var(--bg3);border:1px solid var(--border2);color:var(--text2);font-family:var(--sans);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s}
.bc:active{transform:scale(.97);background:var(--bg4)}
.btv{flex:2;padding:10px;border-radius:var(--r);background:linear-gradient(135deg,#1a6fff,#0050cc);border:none;color:#fff;font-family:var(--sans);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}
.btv:active{transform:scale(.97);opacity:.9}
#loader{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:80vh;gap:12px}
.ring{width:32px;height:32px;border:2px solid var(--border2);border-top-color:var(--long);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.lt{font-family:var(--mono);font-size:9px;color:var(--text2);letter-spacing:.1em}
#empty{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:8px;padding:24px}
.fi{animation:fi .35s ease both}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.fi1{animation-delay:.04s}.fi2{animation-delay:.08s}.fi3{animation-delay:.12s}
.fi4{animation-delay:.16s}.fi5{animation-delay:.20s}.fi6{animation-delay:.24s}
</style>
</head>
<body>
<div id="app">
  <div id="loader"><div class="ring"></div><div class="lt">LOADING SIGNAL...</div></div>
  <div id="empty" style="display:none;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:8px;padding:24px">
    <div style="font-size:28px;opacity:.4">📡</div>
    <div style="font-family:var(--mono);font-size:12px;color:var(--text2)">NO SIGNAL DATA</div>
    <div style="font-family:var(--mono);font-size:9px;color:var(--text3);text-align:center;line-height:1.6">Run /analyze in the bot to generate a signal first.</div>
  </div>
  <div id="content" style="display:none"></div>
</div>
<div class="toast" id="toast"></div>
<div class="bbar">
  <button class="bc" onclick="closeApp()">✕ Close</button>
  <button class="btv" onclick="goTV()">📺 Open TradingView</button>
</div>
<script>
const tg=window.Telegram?.WebApp;
if(tg){tg.ready();tg.expand();tg.setHeaderColor('#080c14');tg.setBackgroundColor('#080c14')}
function getSignal(){try{const p=new URLSearchParams(location.search),r=p.get('d');return r?JSON.parse(atob(decodeURIComponent(r))):null}catch(e){return null}}
function fp(v){if(!v&&v!==0)return'--';const f=parseFloat(v);if(isNaN(f))return'--';if(f>=10000)return'$'+f.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});if(f>=100)return'$'+f.toFixed(4);if(f>=1)return'$'+f.toFixed(5);return'$'+f.toFixed(8)}
function cpy(v){navigator.clipboard?.writeText(v).catch(()=>{});if(tg?.HapticFeedback)tg.HapticFeedback.notificationOccurred('success');toast('Copied: '+v)}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800)}
function closeApp(){if(tg?.HapticFeedback)tg.HapticFeedback.impactOccurred('light');if(tg)tg.close()}
function goTV(){if(tg?.HapticFeedback)tg.HapticFeedback.impactOccurred('medium');switchTab('tv')}
function togglePipe(id){const d=document.getElementById('pd-'+id),r=document.getElementById('pr-'+id);if(!d)return;if(tg?.HapticFeedback)tg.HapticFeedback.selectionChanged();d.classList.toggle('open');r.classList.toggle('expanded')}
function switchTab(which){if(tg?.HapticFeedback)tg.HapticFeedback.selectionChanged();document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.getElementById('tab-'+which).classList.add('active');document.querySelectorAll('.cpanel').forEach(p=>p.classList.remove('vis'));document.getElementById(which+'-panel').classList.add('vis');if(which==='tv'&&!window._tvOk)initTV();if(which==='ict'&&window._sig)initICT(window._sig)}
const GNAMES=['Structure Bias','Imbalance/FVG','OB Entry','Liquidity Sweep','Kill Zone','HTF Align','Market Structure','Volume Profile','R:R Floor','Macro Clear'];

/* ── TRADINGVIEW WIDGET ── */
let _tvOk=false;
function initTV(){
  const sig=window._sig;if(!sig)return;_tvOk=true;
  const sym='BINANCE:'+(sig.symbol||'BTCUSDT').toUpperCase();
  const tfMap={'1m':'1','5m':'5','15m':'15','15M':'15','30m':'30','1H':'60','1h':'60','2H':'120','4H':'240','4h':'240','6H':'360','12H':'720','1D':'D','1d':'D'};
  const tf=tfMap[sig.chart_tf||sig.exec_tf||'1H']||'60';
  try{
    new TradingView.widget({
      container:'tv-container',symbol:sym,interval:tf,timezone:'Etc/UTC',
      theme:'dark',style:'1',locale:'en',toolbar_bg:'#080c14',
      enable_publishing:false,hide_top_toolbar:false,save_image:false,
      allow_symbol_change:false,hide_side_toolbar:false,
      studies:['RSI@tv-studyapi','Volume@tv-studyapi'],
      width:'100%',height:'100%',
      overrides:{
        'mainSeriesProperties.candleStyle.upColor':'#00d876',
        'mainSeriesProperties.candleStyle.downColor':'#f03050',
        'mainSeriesProperties.candleStyle.borderUpColor':'#00d876',
        'mainSeriesProperties.candleStyle.borderDownColor':'#f03050',
        'mainSeriesProperties.candleStyle.wickUpColor':'#00d876',
        'mainSeriesProperties.candleStyle.wickDownColor':'#f03050',
        'paneProperties.background':'#04080f',
        'paneProperties.backgroundType':'solid',
        'paneProperties.vertGridProperties.color':'#0e1820',
        'paneProperties.horzGridProperties.color':'#0e1820',
      }
    });
  }catch(e){console.warn('TV error:',e)}
}

/* ── LIVE ICT CANVAS CHART ── */

        <button class="tfb" data-tf="15m" onclick="changeTF('15m',this)">15m</button>
        <button class="tfb" data-tf="1h" onclick="changeTF('1h',this)">1H</button>
        <button class="tfb active" data-tf="4h" onclick="changeTF('4h',this)">4H</button>
        <button class="tfb" data-tf="1d" onclick="changeTF('1d',this)">1D</button>
      </div>
      <div class="cst"><div class="cdot" id="conn-dot"></div><span id="conn-lbl">Connecting...</span></div>
    </div>
    <div id="ict-wrap"><canvas id="ict-cv"></canvas></div>
    <div class="lgrow">${[['#ffb300','OB'],['#00d8ff','FVG'],['#00b4ff','OTE'],['#00d876','TP'],['#f03050','SL1'],['#ff7818','SL2'],['#902020','SL3'],['#40d890','DRAW'],['#ffd800','MA20'],['#909090','MA50']].map(([c,l])=>`<div class="lgi"><div class="lgd" style="background:${c}"></div><span>${l}</span></div>`).join('')}</div>
  </div>
  <div class="cpanel fi fi2" id="tv-panel" style="height:380px"><div id="tv-container"></div></div>
  ${btf||rtf||etf?`<div class="sec fi fi3"><span class="sect">Multi-Timeframe</span>${tt?`<span class="secb">${tt}</span>`:''}</div><div class="mtfc fi fi3"><div class="mtfr">${btf?`<span class="mtft b">${btf}</span><span class="mtfa">→</span>`:''} ${rtf?`<span class="mtft r">${rtf}</span><span class="mtfa">→</span>`:''} ${etf?`<span class="mtft e">${etf}</span>`:''}</div></div>`:''}
  <div class="sec fi fi3"><span class="sect">Trade Levels</span><span class="secb">Tap to copy</span></div>
  <div class="rc fi fi3"><div class="rw">${lvl('TP3','tp3',d.tp3,t3p)}${lvl('TP2','tp2',d.tp2,t2p)}${lvl('TP1','tp1',d.tp1,t1p)}${lvl('ENTRY','entry',em,null)}${lvl('SL','sl',d.sl1||d.inv_sl,slp)}${lvl('INVAL','inv',d.inv_sl,null)}</div>
    <div class="rftr"><div class="rfi"><span class="rfl">R:R Ratio</span><span class="rfv ${parseFloat(rr)>=2?'good':''}">${rr}</span><div class="rrbg"><div class="rrfill" id="rrBar"></div></div></div><div class="rfi"><span class="rfl">Confidence</span><span class="rfv">${conf}<span style="font-size:9px;color:var(--text2)">/100</span></span></div></div>
  </div>
  <div class="sec fi fi4"><span class="sect">10-Gate Dashboard</span><span class="secb">${gc}/10 Pass</span></div>
  <div class="gc fi fi4"><div class="gg">${gates}</div></div>
  <div class="sec fi fi4"><span class="sect">HMM Regime — Viterbi</span><span class="secb">${hp.length} bars</span></div>
  <div class="hc fi fi4"><div class="ht"><span class="hs ${hs}">${hmm.hmm_state||'RANGE'}</span><div class="hbw"><div class="hbb"><div class="hbf ${hs}" id="hmmBar"></div></div><span class="hpct">${hmm.hmm_confidence_pct||'—'}</span></div></div><div class="hp">${pnodes}</div></div>
  ${gps.length?`<div class="sec fi fi5"><span class="sect">Gap Detection</span><span class="secb">${gps.filter(g=>g.quality==='FULL').length}/8 Full</span></div><div class="gapc fi fi5">${grs}</div>`:''}
  <div class="sec fi fi5"><span class="sect">OCE Pipeline</span><span class="secb">Stage 4.9</span></div>
  <div class="pc fi fi5">${pipes}</div>
  <div style="height:6px"></div>`;
}
function runAnims(d){
  const rr=Math.min(100,(parseFloat(d.rr||0)/3)*100);
  setTimeout(()=>{const b=document.getElementById('rrBar');if(b)b.style.width=rr+'%'},400);
  const hc=parseFloat((d.hmm_data||{}).hmm_confidence||0.5)*100;
  setTimeout(()=>{const b=document.getElementById('hmmBar');if(b)b.style.width=hc+'%'},600);
  setTimeout(()=>{if(window._sig){_lpx=document.getElementById('live-px');initICT(window._sig)}},350);
}
function init(){
  const d=getSignal();
  setTimeout(()=>{
    document.getElementById('loader').style.display='none';
    if(!d){document.getElementById('empty').style.display='flex';return}
    const c=document.getElementById('content');c.innerHTML=build(d);c.style.display='block';
    runAnims(d);
  },400);
}
document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
